<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limitless Elite - Manager Pro v3.0</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #ffffff; color: #1a1a1a; }
        .gold-gradient { background: linear-gradient(135deg, #D4AF37 0%, #F9E29C 50%, #B8860B 100%); }
        .gold-text { color: #B8860B; }
        .card-luxury { background: white; border-radius: 2rem; box-shadow: 0 10px 30px rgba(212, 175, 55, 0.15); border: 1px solid rgba(212, 175, 55, 0.1); }
        .input-luxe { width: 100%; padding: 1.1rem; background: #fcfcfc; border-radius: 1.2rem; border: 1px solid #eee; outline: none; }
        .nav-active { color: #B8860B !important; }
        .progress-bar { height: 8px; border-radius: 4px; background: #f0f0f0; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #D4AF37, #B8860B); transition: width 0.5s ease-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [view, setView] = useState('agenda');
            const [sales, setSales] = useState(() => JSON.parse(localStorage.getItem('limitless_final_sales')) || []);

            // --- SAUVEGARDE ---
            useEffect(() => {
                localStorage.setItem('limitless_final_sales', JSON.stringify(sales));
            }, [sales]);

            // --- CALCULS STATISTIQUES ---
            const stats = useMemo(() => {
                const results = { DA: { total: 0, clients: {}, categories: {} }, EUR: { total: 0, clients: {}, categories: {} } };
                
                sales.forEach(s => {
                    const d = s.currency === '€' ? 'EUR' : 'DA';
                    results[d].total += s.amount;
                    results[d].clients[s.client] = (results[d].clients[s.client] || 0) + s.amount;
                    results[d].categories[s.category] = (results[d].categories[s.category] || 0) + s.amount;
                });

                return results;
            }, [sales]);

            // --- GÉNÉRATION AUTOMATIQUE DES RELANCES J+30 ---
            const followUpEvents = useMemo(() => {
                return sales.map(s => {
                    const saleDate = new Date(s.date);
                    saleDate.setDate(saleDate.getDate() + 30);
                    return {
                        date: saleDate.toISOString().split('T')[0],
                        title: `Relance : ${s.client}`,
                        type: "🔄 SUIVI CLIENT",
                        icon: "fa-phone-alt",
                        color: "text-blue-500",
                        isFollowUp: true
                    };
                });
            }, [sales]);

            const staticEvents = [
                { date: "2026-05-31", title: "Fête des Mères", type: "🎁 BUSINESS", icon: "fa-crown", color: "text-pink-600" },
                { date: "2026-06-16", title: "Aïd al-Adha", type: "🌙 RELIGIEUX", icon: "fa-kaaba", color: "text-green-600" }
            ];

            const allEvents = [...staticEvents, ...followUpEvents].sort((a,b) => new Date(a.date) - new Date(b.date));

            const handleAddSale = (e) => {
                e.preventDefault();
                const f = e.target;
                const newSale = {
                    id: Date.now(),
                    client: f.client.value,
                    product: f.product.value,
                    category: f.category.value,
                    amount: parseFloat(f.amount.value),
                    currency: f.currency.value,
                    date: new Date().toISOString().split('T')[0]
                };
                setSales([newSale, ...sales]);
                f.reset(); setView('stats');
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white pb-32 relative shadow-2xl">
                    <header className="gold-gradient pt-12 pb-10 px-6 rounded-b-[3rem] text-center shadow-lg text-white">
                        <h1 className="text-2xl font-bold tracking-widest">LIMITLESS ELITE</h1>
                        <p className="text-[10px] uppercase tracking-[0.3em]">Manager Pro v3.5</p>
                    </header>

                    <main className="px-6 mt-8">
                        {/* --- VUE AGENDA --- */}
                        {view === 'agenda' && (
                            <div className="space-y-4">
                                <h2 className="text-lg font-bold gold-text uppercase italic">Mon Planning</h2>
                                {allEvents.filter(ev => new Date(ev.date) >= new Date()).slice(0, 8).map((ev, i) => (
                                    <div key={i} className={`card-luxury p-4 flex items-center gap-4 ${ev.isFollowUp ? 'border-l-4 border-blue-400' : ''}`}>
                                        <div className={`w-10 h-10 rounded-xl bg-gray-50 flex items-center justify-center ${ev.color}`}>
                                            <i className={`fas ${ev.icon}`}></i>
                                        </div>
                                        <div className="flex-1">
                                            <p className="font-bold text-xs">{ev.title}</p>
                                            <p className="text-[9px] text-gray-400 font-bold uppercase">{ev.type}</p>
                                        </div>
                                        <p className="text-[10px] font-bold gold-text">{new Date(ev.date).toLocaleDateString('fr-FR', {day:'numeric', month:'short'})}</p>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* --- VUE VENTE --- */}
                        {view === 'vente' && (
                            <div className="card-luxury p-8">
                                <h2 className="text-xl font-bold gold-text mb-6 italic">Nouvelle Vente</h2>
                                <form onSubmit={handleAddSale} className="space-y-4">
                                    <input name="client" required className="input-luxe text-sm" placeholder="Nom du Client" />
                                    <input name="product" required className="input-luxe text-sm" placeholder="Nom du Produit" />
                                    <select name="category" className="input-luxe text-sm">
                                        <option value="Parfum">Parfum</option>
                                        <option value="Soins Corps">Soins Corps</option>
                                        <option value="Maquillage">Maquillage</option>
                                        <option value="Solaire">Solaire</option>
                                    </select>
                                    <div className="flex gap-2">
                                        <input name="amount" type="number" required className="flex-1 input-luxe text-sm" placeholder="Prix" />
                                        <select name="currency" className="w-24 input-luxe font-bold text-[#B8860B]">
                                            <option value="DA">DA</option>
                                            <option value="€">€</option>
                                        </select>
                                    </div>
                                    <button type="submit" className="w-full gold-gradient text-white font-bold py-4 rounded-2xl shadow-xl mt-4 uppercase text-xs tracking-widest">Enregistrer</button>
                                </form>
                            </div>
                        )}

                        {/* --- VUE STATS --- */}
                        {view === 'stats' && (
                            <div className="space-y-8">
                                {['DA', 'EUR'].map(devise => (
                                    <div key={devise} className="space-y-6">
                                        <h2 className="text-lg font-bold gold-text italic border-b pb-2">Business {devise}</h2>
                                        
                                        {/* CA Total */}
                                        <div className="bg-slate-900 rounded-[2.5rem] p-6 text-center text-white shadow-xl relative overflow-hidden">
                                            <p className="text-yellow-500 text-[10px] font-bold uppercase tracking-widest">Chiffre d'Affaires</p>
                                            <p className="text-3xl font-bold mt-1">{stats[devise].total.toLocaleString()} {devise === 'EUR' ? '€' : 'DA'}</p>
                                        </div>

                                        {/* Top Clients */}
                                        <div className="card-luxury p-6">
                                            <h3 className="text-[10px] font-bold uppercase text-gray-400 mb-4 tracking-widest flex items-center gap-2">
                                                <i className="fas fa-crown text-yellow-500"></i> Top Clients
                                            </h3>
                                            {Object.entries(stats[devise].clients).sort((a,b) => b[1] - a[1]).slice(0,3).map(([name, val], idx) => (
                                                <div key={name} className="flex justify-between items-center py-2 border-b border-gray-50 last:border-0">
                                                    <span className="text-xs font-medium text-gray-600">{idx+1}. {name}</span>
                                                    <span className="text-xs font-bold gold-text">{val} {devise === 'EUR' ? '€' : 'DA'}</span>
                                                </div>
                                            ))}
                                        </div>

                                        {/* Graphe Catégories */}
                                        <div className="card-luxury p-6">
                                            <h3 className="text-[10px] font-bold uppercase text-gray-400 mb-4 tracking-widest flex items-center gap-2">
                                                <i className="fas fa-chart-pie text-blue-400"></i> Par Catégorie
                                            </h3>
                                            {Object.entries(stats[devise].categories).map(([cat, val]) => (
                                                <div key={cat} className="mb-4">
                                                    <div className="flex justify-between text-[11px] mb-1">
                                                        <span className="font-bold">{cat}</span>
                                                        <span className="gold-text font-bold">{val} {devise === 'EUR' ? '€' : 'DA'}</span>
                                                    </div>
                                                    <div className="progress-bar">
                                                        <div className="progress-fill" style={{ width: `${(val / stats[devise].total) * 100}%` }}></div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* BARRE NAV */}
                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 backdrop-blur-md border-t flex justify-around items-center py-5 z-50 rounded-t-[3rem] shadow-2xl">
                        <button onClick={() => setView('agenda')} className={`flex flex-col items-center gap-1 transition ${view === 'agenda' ? 'nav-active' : 'text-gray-300'}`}>
                            <i className="fas fa-calendar-alt text-xl"></i>
                            <span className="text-[9px] font-bold uppercase">Agenda</span>
                        </button>
                        <button onClick={() => setView('vente')} className="relative -mt-16 active:scale-90 transition">
                            <div className="w-16 h-16 gold-gradient rounded-full flex items-center justify-center border-8 border-white shadow-2xl">
                                <i className="fas fa-plus text-white text-2xl"></i>
                            </div>
                            <span className="absolute -bottom-6 left-1/2 -translate-x-1/2 text-[9px] font-bold gold-text uppercase">Vente</span>
                        </button>
                        <button onClick={() => setView('stats')} className={`flex flex-col items-center gap-1 transition ${view === 'stats' ? 'nav-active' : 'text-gray-300'}`}>
                            <i className="fas fa-chart-bar text-xl"></i>
                            <span className="text-[9px] font-bold uppercase">Stats</span>
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
