<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limitless Elite - Manager Pro v3.0</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #ffffff; color: #1a1a1a; overflow-x: hidden; }
        .gold-gradient { background: linear-gradient(135deg, #D4AF37 0%, #F9E29C 50%, #B8860B 100%); }
        .gold-text { color: #B8860B; }
        .card-luxury { 
            background: white; border-radius: 2rem; 
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.15); 
            border: 1px solid rgba(212, 175, 55, 0.1);
        }
        .input-luxe {
            width: 100%; padding: 1.1rem; background: #fcfcfc; border-radius: 1.2rem;
            border: 1px solid #eee; outline: none; transition: 0.3s;
        }
        .input-luxe:focus { border-color: #D4AF37; box-shadow: 0 0 15px rgba(212, 175, 55, 0.1); }
        .nav-active { color: #B8860B !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-view { animation: fadeIn 0.4s ease-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('agenda');
            
            // --- SAUVEGARDE LOCALE ---
            const [sales, setSales] = useState(() => {
                const saved = localStorage.getItem('limitless_pro_sales');
                return saved ? JSON.parse(saved) : [];
            });

            const [customEvents, setCustomEvents] = useState(() => {
                const saved = localStorage.getItem('limitless_pro_events');
                return saved ? JSON.parse(saved) : [];
            });

            // --- CALENDRIER STRATÉGIQUE COMPLET 2026 ---
            const staticEvents = [
                { date: "2026-01-04", title: "Épiphanie", type: "✝️ CATHOLIQUE", icon: "fa-star", color: "text-blue-400" },
                { date: "2026-01-07", title: "Soldes d'hiver (Début)", type: "🛍️ COMMERCE", icon: "fa-tag", color: "text-red-500" },
                { date: "2026-01-15", title: "Soins d'Hiver / Hydratation", type: "💡 CONSEIL", icon: "fa-snowflake", color: "text-cyan-500" },
                { date: "2026-02-02", title: "Chandeleur", type: "✝️ CATHOLIQUE", icon: "fa-pancakes", color: "text-yellow-500" },
                { date: "2026-02-14", title: "Saint-Valentin", type: "💖 BUSINESS", icon: "fa-heart", color: "text-pink-500" },
                { date: "2026-03-20", title: "Aïd el-Fitr", type: "🌙 MUSULMAN", icon: "fa-moon", color: "text-green-600" },
                { date: "2026-04-05", title: "Pâques", type: "✝️ CATHOLIQUE", icon: "fa-egg", color: "text-indigo-400" },
                { date: "2026-05-11", title: "Rappel J-20 : Fête des Mères", type: "⚠️ STRATÉGIE", icon: "fa-clock", color: "text-orange-500" },
                { date: "2026-05-14", title: "Ascension", type: "✝️ CATHOLIQUE", icon: "fa-cloud-upload-alt", color: "text-blue-300" },
                { date: "2026-05-24", title: "Pentecôte", type: "✝️ CATHOLIQUE", icon: "fa-dove", color: "text-gray-400" },
                { date: "2026-05-27", title: "Aïd al-Adha", type: "🌙 MUSULMAN", icon: "fa-kaaba", color: "text-green-700" },
                { date: "2026-05-31", title: "Fête des Mères", type: "🎁 TOP VENTES", icon: "fa-crown", color: "text-pink-600" },
                { date: "2026-06-10", title: "Vente Solaire & Été", type: "☀️ SAISON", icon: "fa-sun", color: "text-yellow-600" },
                { date: "2026-06-21", title: "Fête des Pères", type: "👔 BUSINESS", icon: "fa-user-tie", color: "text-blue-700" },
                { date: "2026-06-24", title: "Soldes d'été (Début)", type: "🛍️ COMMERCE", icon: "fa-shopping-cart", color: "text-orange-500" },
                { date: "2026-08-15", title: "Assomption", type: "✝️ CATHOLIQUE", icon: "fa-church", color: "text-blue-600" },
                { date: "2026-09-25", title: "French Days d'automne", type: "🇫🇷 PROMO", icon: "fa-flag", color: "text-blue-800" },
                { date: "2026-11-01", title: "Toussaint", type: "✝️ CATHOLIQUE", icon: "fa-leaf", color: "text-orange-800" },
                { date: "2026-11-27", title: "Black Friday", type: "🔥 BOOM VENTES", icon: "fa-fire", color: "text-black" },
                { date: "2026-12-25", title: "Noël", type: "🎄 CATHOLIQUE", icon: "fa-tree", color: "text-red-600" }
            ];

            const allEvents = [...staticEvents, ...customEvents].sort((a,b) => new Date(a.date) - new Date(b.date));

            useEffect(() => {
                localStorage.setItem('limitless_pro_sales', JSON.stringify(sales));
                localStorage.setItem('limitless_pro_events', JSON.stringify(customEvents));
            }, [sales, customEvents]);

            // --- CALCULS ---
            const totalDA = sales.filter(s => s.currency === 'DA').reduce((acc, s) => acc + s.amount, 0);
            const totalEUR = sales.filter(s => s.currency === '€').reduce((acc, s) => acc + s.amount, 0);

            const handleAddSale = (e) => {
                e.preventDefault();
                const f = e.target;
                const newSale = { id: Date.now(), client: f.client.value, product: f.product.value, amount: parseFloat(f.amount.value), currency: f.currency.value, date: new Date().toLocaleDateString() };
                setSales([newSale, ...sales]);
                f.reset(); setView('stats');
            };

            const handleAddEvent = (e) => {
                e.preventDefault();
                const f = e.target;
                const newEv = { id: Date.now(), title: f.title.value, date: f.date.value, type: "PERSO", icon: "fa-star", color: "text-yellow-500" };
                setCustomEvents([...customEvents, newEv]);
                f.reset(); setView('agenda');
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white pb-36 relative shadow-2xl">
                    {/* HEADER */}
                    <header className="gold-gradient pt-14 pb-12 px-6 rounded-b-[3.5rem] text-center shadow-xl">
                        <h1 className="text-white text-2xl font-bold tracking-[0.2em] drop-shadow-sm">LIMITLESS ELITE</h1>
                        <p className="text-white/90 text-[10px] uppercase tracking-[0.3em] mt-1 font-light">Manager Pro Edition</p>
                    </header>

                    <main className="px-6 mt-8 animate-view">
                        
                        {/* 1. AGENDA STRATÉGIQUE */}
                        {view === 'agenda' && (
                            <div className="space-y-4">
                                <div className="flex justify-between items-center mb-2">
                                    <h2 className="text-lg font-bold gold-text uppercase tracking-tight italic">Planning 2026</h2>
                                    <button onClick={() => setView('addEvent')} className="text-[10px] font-bold border border-[#D4AF37] text-[#B8860B] px-4 py-1.5 rounded-full uppercase">+ Événement</button>
                                </div>
                                {allEvents.map((ev, index) => (
                                    <div key={index} className="card-luxury p-4 flex items-center gap-4 transition transform active:scale-95">
                                        <div className={`w-12 h-12 rounded-2xl bg-gray-50 flex items-center justify-center ${ev.color}`}>
                                            <i className={`fas ${ev.icon} text-xl`}></i>
                                        </div>
                                        <div className="flex-1">
                                            <p className="font-bold text-[13px] text-gray-800 leading-tight">{ev.title}</p>
                                            <p className="text-[9px] text-gray-400 uppercase font-bold tracking-wider mt-0.5">{ev.type}</p>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-[10px] font-bold text-[#B8860B] bg-yellow-50 px-2 py-1 rounded-lg">
                                                {new Date(ev.date).toLocaleDateString('fr-FR', {day:'numeric', month:'short'})}
                                            </p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* 2. FORMULAIRE VENTE (Bouton central) */}
                        {view === 'vente' && (
                            <div className="card-luxury p-8 border-t-4 border-t-[#D4AF37]">
                                <h2 className="text-xl font-bold gold-text mb-6 flex items-center gap-2">
                                    <i className="fas fa-plus-circle"></i> Nouvelle Vente
                                </h2>
                                <form onSubmit={handleAddSale} className="space-y-5">
                                    <input name="client" required className="input-luxe" placeholder="Nom du Client" />
                                    <input name="product" required className="input-luxe" placeholder="Produit Chogan" />
                                    <div className="flex gap-3">
                                        <input name="amount" type="number" step="0.01" required className="flex-1 input-luxe" placeholder="Montant" />
                                        <select name="currency" className="w-24 input-luxe font-bold text-[#B8860B] border-none shadow-sm">
                                            <option value="DA">DA</option>
                                            <option value="€">€</option>
                                        </select>
                                    </div>
                                    <button type="submit" className="w-full gold-gradient text-white font-bold py-5 rounded-2xl shadow-xl uppercase tracking-widest mt-4 active:scale-95 transition">
                                        ENREGISTRER LA VENTE
                                    </button>
                                </form>
                            </div>
                        )}

                        {/* 3. STATISTIQUES SÉPARÉES */}
                        {view === 'stats' && (
                            <div className="space-y-6">
                                <h2 className="text-lg font-bold gold-text uppercase italic">Tableau de Bord</h2>
                                <div className="bg-slate-900 rounded-[2.5rem] p-7 text-center shadow-2xl border-b-8 border-yellow-500 relative overflow-hidden">
                                    <div className="absolute top-0 right-0 p-4 opacity-10"><i className="fas fa-chart-line text-6xl text-white"></i></div>
                                    <p className="text-yellow-500 text-[10px] font-bold uppercase tracking-[0.2em]">Chiffre d'Affaires DZ</p>
                                    <p className="text-white text-4xl font-bold mt-2">{totalDA.toLocaleString()} <span className="text-sm font-light">DA</span></p>
                                </div>
                                <div className="bg-slate-800 rounded-[2.5rem] p-7 text-center shadow-2xl border-b-8 border-blue-400 relative overflow-hidden">
                                    <div className="absolute top-0 right-0 p-4 opacity-10"><i className="fas fa-euro-sign text-6xl text-white"></i></div>
                                    <p className="text-blue-400 text-[10px] font-bold uppercase tracking-[0.2em]">Chiffre d'Affaires EUR</p>
                                    <p className="text-white text-4xl font-bold mt-2">{totalEUR.toLocaleString()} <span className="text-sm font-light">€</span></p>
                                </div>
                                <div className="card-luxury p-6">
                                    <h3 className="font-bold text-[11px] uppercase text-gray-400 mb-4 tracking-widest flex justify-between">
                                        <span>Derniers mouvements</span>
                                        <i className="fas fa-history"></i>
                                    </h3>
                                    {sales.slice(0,6).map(s => (
                                        <div key={s.id} className="flex justify-between py-3 text-xs border-b border-gray-50 last:border-0">
                                            <div className="font-medium text-gray-700">{s.client} <span className="text-gray-300 mx-1">•</span> <span className="text-[10px] text-gray-400">{s.product}</span></div>
                                            <div className={`font-bold ${s.currency === '€' ? 'text-blue-500' : 'text-yellow-600'}`}>{s.amount} {s.currency}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* 4. AJOUT ÉVÉNEMENT CUSTOM */}
                        {view === 'addEvent' && (
                            <div className="card-luxury p-8">
                                <h2 className="text-lg font-bold gold-text mb-6 text-center">Ajouter un rendez-vous</h2>
                                <form onSubmit={handleAddEvent} className="space-y-4">
                                    <input name="title" required className="input-luxe" placeholder="Ex: Salon de beauté Oran" />
                                    <input name="date" type="date" required className="input-luxe" />
                                    <button type="submit" className="w-full gold-gradient text-white font-bold py-4 rounded-2xl shadow-lg mt-4">PROGRAMMER</button>
                                    <button type="button" onClick={() => setView('agenda')} className="w-full text-[10px] text-gray-400 font-bold uppercase py-2">Retour</button>
                                </form>
                            </div>
                        )}
                    </main>

                    {/* BARRE DE NAVIGATION LUXE AVEC "+" */}
                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 backdrop-blur-md border-t flex justify-around items-center py-5 z-50 rounded-t-[3rem] shadow-[0_-10px_40px_rgba(0,0,0,0.08)]">
                        <button onClick={() => setView('agenda')} className={`flex flex-col items-center gap-1 transition ${view === 'agenda' ? 'nav-active' : 'text-gray-300'}`}>
                            <i className="fas fa-calendar-alt text-2xl"></i>
                            <span className="text-[9px] font-bold uppercase tracking-tighter">Agenda</span>
                        </button>
                        
                        <button onClick={() => setView('vente')} className="relative -mt-20">
                            <div className="w-16 h-16 gold-gradient rounded-full flex items-center justify-center border-[6px] border-white shadow-[0_10px_20px_rgba(212,175,55,0.3)] transform active:scale-90 transition">
                                <i className="fas fa-plus text-white text-2xl"></i>
                            </div>
                            <span className="absolute -bottom-7 left-1/2 -translate-x-1/2 text-[9px] font-bold gold-text uppercase">Vente</span>
                        </button>

                        <button onClick={() => setView('stats')} className={`flex flex-col items-center gap-1 transition ${view === 'stats' ? 'nav-active' : 'text-gray-300'}`}>
                            <i className="fas fa-chart-bar text-2xl"></i>
                            <span className="text-[9px] font-bold uppercase tracking-tighter">Stats</span>
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
