<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Manager Elite</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#f9f9f9; font-family: Arial }
.card { background:white; padding:12px; border-radius:12px; margin-bottom:10px }
</style>
</head>

<body class="p-4">

<div class="max-w-md mx-auto">

<h1 class="text-xl font-bold text-center mb-4">CRM MANAGER</h1>

<!-- LOGIN MANAGER -->
<div id="login" class="card">
<input id="pass" type="password" placeholder="Mot de passe manager" class="border p-2 w-full mb-2">
<button onclick="login()" class="bg-black text-white w-full p-2">Accéder</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div class="card">
<input id="consultant" placeholder="Consultante" class="border p-2 w-full mb-2">
<input id="name" placeholder="Cliente" class="border p-2 w-full mb-2">
<input id="product" placeholder="Produit" class="border p-2 w-full mb-2">
<input id="price" type="number" placeholder="Prix (€)" class="border p-2 w-full mb-2">
<input id="date" type="date" class="border p-2 w-full mb-2">

<button onclick="addSale()" class="bg-yellow-500 text-white w-full p-2">Ajouter</button>
</div>

<!-- MANAGER STATS -->
<div class="card">
<h2 class="font-bold mb-2">📊 Performance équipe</h2>
<div id="stats"></div>
</div>

<!-- LIST -->
<div id="list"></div>

</div>

</div>

<script>

let PASSWORD = "1234"; // 🔥 change ici
let sales = JSON.parse(localStorage.getItem("sales")) || [];

/* LOGIN */
function login(){
if(document.getElementById("pass").value === PASSWORD){
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
render();
}else{
alert("Mot de passe incorrect");
}
}

/* ADD */
function addSale(){
let c = consultant.value;
let n = name.value;
let p = product.value;
let price = parseFloat(document.getElementById("price").value);
let d = date.value;

if(!c||!n||!p||!price||!d) return alert("Champs requis");

let relance = new Date(d);
relance.setDate(relance.getDate()+40);

sales.push({
id: Date.now(),
consultant:c,
name:n,
product:p,
price:price,
date:d,
relance:relance.toISOString().split("T")[0]
});

save();
}

/* SAVE */
function save(){
localStorage.setItem("sales", JSON.stringify(sales));
render();
}

/* RENDER */
function render(){

let html="";
let stats={};

sales.forEach(s=>{

// stats
if(!stats[s.consultant]){
stats[s.consultant]={ca:0,total:0};
}
stats[s.consultant].ca += s.price;
stats[s.consultant].total++;

let msg = `Bonjour ${s.name} 😊

Je reviens vers toi pour ton ${s.product} ✨

Je peux te proposer un réassort si tu veux 💖`;

let url = `https://wa.me/?text=${encodeURIComponent(msg)}`;

html += `
<div class="card">
<p><b>${s.consultant}</b></p>
<p>${s.name} - ${s.product}</p>
<p>${s.price} €</p>

<a href="${url}" target="_blank" class="bg-green-500 text-white p-2 block text-center rounded">
WhatsApp
</a>
</div>
`;

});

// manager stats
let statsHTML="";
Object.keys(stats).forEach(c=>{
statsHTML += `
<div class="card">
<p><b>${c}</b></p>
<p>CA: ${stats[c].ca} €</p>
<p>Ventes: ${stats[c].total}</p>
</div>
`;
});

document.getElementById("list").innerHTML = html;
document.getElementById("stats").innerHTML = statsHTML;

}

</script>

</body>
</html>
