<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Limitless Elite — Manager Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{
  --bg:#FDFDFD;--surf:#FFFFFF;--surf2:#F8F9FA;
  --border:rgba(201,168,76,0.15);--text:#2D3436;--muted:#636E72;
  --gold:#C9A84C;--gold-d:#8B6914;--red:#D63031;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden;}

.screen{display:none;}
.screen.on{display:block;}

/* TOPBAR */
.topbar{background:var(--surf);border-bottom:1px solid var(--border);padding:0 16px;height:60px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;}
.ws-name{font-weight:700;font-size:14px;color:var(--gold-d);font-family:'Cormorant Garamond',serif;text-transform:uppercase;letter-spacing:1px;}

/* VIEW SYSTEM */
.view{display:none;padding-bottom:100px;}
.view.on{display:block;}

/* EVENT CARDS */
.card-event{background:var(--surf);border:1px solid var(--border);border-radius:15px;margin:12px;padding:15px;box-shadow:0 4px 15px rgba(0,0,0,0.03);display:flex;align-items:center;gap:15px;}
.date-box{background:var(--surf2);border:1px solid var(--gold);border-radius:10px;min-width:50px;height:55px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.date-day{font-size:18px;font-weight:800;color:var(--gold-d);}
.date-month{font-size:9px;text-transform:uppercase;color:var(--muted);}

/* ACCESS DENIED OVERLAY */
.lock-msg{text-align:center;padding:40px 20px;color:var(--muted);}
.lock-icon{font-size:40px;color:var(--gold);margin-bottom:15px;opacity:0.5;}

/* NAVIGATION */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--surf);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom,0);z-index:1000;}
.ni{flex:1;padding:12px 2px;text-align:center;color:var(--muted);font-size:10px;transition:0.2s;}
.ni.on{color:var(--gold);}
.ni i{font-size:18px;margin-bottom:4px;}

/* BUTTONS */
.btn-p{background:linear-gradient(135deg,#C9A84C,#A07A28);color:#FFF;font-weight:700;border-radius:10px;padding:14px;width:100%;cursor:pointer;border:none;margin-top:10px;}
.inp{background:var(--surf);border:1.5px solid var(--border);border-radius:10px;padding:12px;width:100%;margin-bottom:10px;outline:none;}
</style>
</head>
<body>

<div id="sApp" class="screen on">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="width:32px;height:32px;border-radius:8px;background:var(--gold);display:flex;align-items:center;justify-content:center;color:#FFF;font-weight:900;">L</div>
      <div><div class="ws-name">Limitless Elite</div><div id="hdr-sub" style="font-size:9px;color:var(--muted);">Événements & Ventes</div></div>
    </div>
    <i class="fa-solid fa-bell" style="color:var(--muted);"></i>
  </div>

  <!-- VUE ÉVÉNEMENTS -->
  <div id="view-events" class="view on">
    <div style="padding:20px 15px 5px;">
        <h2 style="font-family:'Cormorant Garamond'; color:var(--gold-d);">Prochains Événements</h2>
        <p style="font-size:11px; color:var(--muted);">Dates clés et périodes de Pre-commandes</p>
    </div>
    <div id="event-list">
        <!-- Généré par JS -->
    </div>
  </div>

  <!-- VUE VENTE -->
  <div id="view-vente" class="view">
    <div style="padding:20px 15px;"><h2>Saisir une Vente</h2></div>
    <div style="padding:0 15px;">
        <div style="background:#FFF; padding:20px; border-radius:15px; border:1px solid var(--border);">
            <label style="font-size:10px; font-weight:700; color:var(--gold);">CLIENTE</label>
            <input class="inp" placeholder="Nom de la cliente">
            <label style="font-size:10px; font-weight:700; color:var(--gold);">PRODUIT</label>
            <input class="inp" placeholder="Référence parfum...">
            <button class="btn-p">Valider la vente</button>
        </div>
    </div>
  </div>

  <!-- VUES SANS ACCÈS -->
  <div id="view-locked" class="view">
    <div class="lock-msg">
        <div class="lock-icon"><i class="fa-solid fa-crown"></i></div>
        <h3 style="font-family:'Cormorant Garamond'; color:var(--text);">Espace Privé</h3>
        <p style="font-size:12px; margin-top:10px;">Cette rubrique est actuellement réservée à l'administration ou en cours de maintenance.</p>
    </div>
  </div>

  <nav class="bnav">
    <div class="ni on" onclick="showTab('events', this)"><i class="fa-solid fa-calendar-star"></i><br>Événements</div>
    <div class="ni" onclick="showTab('vente', this)"><i class="fa-solid fa-cart-shopping"></i><br>Ventes</div>
    <div class="ni" onclick="showTab('locked', this)"><i class="fa-solid fa-users"></i><br>Équipe</div>
    <div class="ni" onclick="showTab('locked', this)"><i class="fa-solid fa-chart-line"></i><br>Stats</div>
  </nav>
</div>

<script>
const MASTER_EVENTS = [
  {n:"Aïd el-Adha 🐑", d:"2026-05-27", t:"event"},
  {n:"Fête des Mères 🌹", d:"2026-05-31", t:"event"},
  {n:"Soldes d'Été ☀️", d:"2026-06-27", t:"event"}
];

function showTab(tab, el){
    document.querySelectorAll('.view').forEach(v => v.classList.remove('on'));
    document.querySelectorAll('.ni').forEach(n => n.classList.remove('on'));
    document.getElementById('view-' + tab).classList.add('on');
    el.classList.add('on');
}

function renderEvents(){
    let html = "";
    let all = [];
    
    MASTER_EVENTS.forEach(e => {
        // L'événement lui-même
        all.push(e);
        // La pre-commande J-20
        let preDate = new Date(e.d);
        preDate.setDate(preDate.getDate() - 20);
        all.push({
            n: "Pre-commandes : " + e.n.split(' ')[0], 
            d: preDate.toISOString().split('T')[0], 
            t: "pre"
        });
    });

    all.sort((a,b) => new Date(a.d) - new Date(b.d));

    all.forEach(e => {
        const dt = new Date(e.d);
        const day = dt.getDate();
        const month = dt.toLocaleString('fr-FR', {month: 'short'});
        const isPre = e.t === "pre";

        html += `
        <div class="card-event" style="${isPre ? 'border-left: 4px solid var(--gold);' : ''}">
            <div class="date-box" style="${isPre ? 'background:rgba(201,168,76,0.1); border:none;' : ''}">
                <div class="date-day">${day}</div>
                <div class="date-month">${month}</div>
            </div>
            <div style="flex:1;">
                <div style="font-weight:700; font-size:13px;">${e.n}</div>
                <div style="font-size:10px; color:var(--muted);">${isPre ? 'Phase de préparation' : 'Événement majeur'}</div>
            </div>
            <i class="fa-solid ${isPre ? 'fa-hourglass-start' : 'fa-star'}" style="color:var(--gold); opacity:0.6;"></i>
        </div>`;
    });
    document.getElementById('event-list').innerHTML = html;
}

// Initialisation
renderEvents();
</script>
</body>
</html>
