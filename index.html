<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limitless Elite - V5.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap');
        body { background:#fdfdfd; font-family: 'Montserrat', sans-serif; color: #333; padding-bottom: 60px; }
        .font-luxury { font-family: 'Playfair Display', serif; }
        .gold-gradient { background: linear-gradient(135deg, #D4AF37 0%, #B8860B 100%); }
        .card { background:white; border-radius:25px; padding:20px; margin-bottom:20px; border: 1px solid rgba(212,175,55,0.15); box-shadow: 0 10px 25px rgba(0,0,0,0.02); }
        
        /* Style Agenda identique à tes captures */
        .agenda-item { display: flex; align-items: center; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #f9f9f9; }
        .agenda-center { flex: 1; display: flex; flex-direction: column; align-items: center; text-align: center; }
        
        .tag { font-size: 7px; padding: 2px 8px; border-radius: 8px; text-transform: uppercase; font-weight: bold; margin-bottom: 4px; color: white; }
        .tag-prepa { background: #7c3aed; }
        .tag-fete { background: #10b981; }

        input, select { border-bottom: 1px solid #eee !important; border: none; outline: none; width: 100%; padding: 12px; font-size: 14px; margin-bottom: 8px; background: transparent; }
        
        /* Intitulé Doré Fixe */
        .gold-label { font-size: 9px; font-weight: bold; color: #bca05d; text-transform: uppercase; margin: 15px 0 5px 0; display: block; text-align: center; letter-spacing: 1px; }
        
        .date-txt { font-size: 9px; color: #9ca3af; font-weight: 600; width: 70px; }
        .days-txt { font-weight: bold; color: #4b5563; font-size: 11px; width: 45px; text-align: right; }
    </style>
</head>
<body class="p-4">

<div class="max-w-md mx-auto">
    <div class="text-center mb-6">
        <h1 class="font-luxury text-3xl font-bold text-yellow-700 tracking-tight">LIMITLESS ELITE</h1>
        <div class="inline-block bg-gray-100 text-[8px] font-bold px-4 py-1 rounded-full uppercase tracking-widest text-gray-400 mt-1">Tableau de Bord Stratégique</div>
    </div>

    <div class="card border-t-4 border-t-yellow-600">
        <h2 class="font-luxury text-sm font-bold mb-4 text-gray-800 uppercase flex justify-center items-center gap-2">
            <i class="fa-solid fa-calendar-check text-yellow-600"></i> Planning & Anticipation
        </h2>
        <div id="calendar-display">
            <div class="agenda-item">
                <div class="date-txt">07/05/2026</div>
                <div class="agenda-center">
                    <span class="tag tag-prepa">Rappel J-20</span>
                    <span class="font-bold text-gray-700 uppercase text-[9px]">📦 PRÉPA STOCK : Aïd el-Adha</span>
                </div>
                <div class="days-txt">J-5</div>
            </div>
            <div class="agenda-item">
                <div class="date-txt">11/05/2026</div>
                <div class="agenda-center">
                    <span class="tag tag-prepa">Rappel J-20</span>
                    <span class="font-bold text-gray-700 uppercase text-[9px]">📦 PRÉPA STOCK : Fête des Mères</span>
                </div>
                <div class="days-txt">J-9</div>
            </div>
            <div class="agenda-item">
                <div class="date-txt">27/05/2026</div>
                <div class="agenda-center">
                    <span class="tag tag-fete">Fête</span>
                    <span class="font-bold text-gray-700 uppercase text-[9px]">Aïd el-Adha</span>
                </div>
                <div class="days-txt">J-25</div>
            </div>
        </div>
    </div>

    <div class="card shadow-lg">
        <h2 class="font-luxury text-md mb-4 text-gray-700 italic border-b pb-2 text-center">Nouvelle Vente</h2>
        <input id="cons" placeholder="Nom de la consultante">
        <input id="cli" placeholder="Nom de la cliente">
        <input id="prd" placeholder="Produit Chogan">
        <div class="flex gap-2">
            <input id="amt" type="number" placeholder="Montant" class="flex-1">
            <select id="cur" class="w-24">
                <option value="DA">DA</option>
                <option value="€">€</option>
            </select>
        </div>
        
        <span class="gold-label">SÉLECTIONNER UNE DATE D'ACHAT</span>
        <input id="vDate" type="date">
        
        <button onclick="saveSale()" class="gold-gradient text-white w-full p-4 rounded-2xl font-bold text-[11px] uppercase tracking-widest shadow-md mt-2">Enregistrer Transaction</button>
    </div>

    <div class="card bg-black text-white">
        <h2 class="text-yellow-500 font-luxury text-[10px] font-bold uppercase tracking-widest mb-4 italic text-center">Performance Équipe</h2>
        <div id="performance" class="space-y-3 text-[11px]"></div>
    </div>
</div>

<script>
function saveSale() {
    const dat = document.getElementById("vDate").value;
    if(!dat) return alert("Date obligatoire");
    
    let sales = JSON.parse(localStorage.getItem("sales")) || [];
    sales.push({
        cons: document.getElementById("cons").value || "Inconnu",
        cli: document.getElementById("cli").value,
        amt: document.getElementById("amt").value,
        cur: document.getElementById("cur").value,
        dat: dat
    });
    localStorage.setItem("sales", JSON.stringify(sales));
    renderPerformance();
    alert("Vente enregistrée !");
}

function renderPerformance() {
    let sales = JSON.parse(localStorage.getItem("sales")) || [];
    let perf = {};
    sales.forEach(s => {
        if(!perf[s.cons]) perf[s.cons] = { da: 0, eu: 0 };
        if(s.cur === "DA") perf[s.cons].da += parseFloat(s.amt)||0; 
        else perf[s.cons].eu += parseFloat(s.amt)||0;
    });
    let html = "";
    for(let c in perf) {
        html += `<div class="flex justify-between border-b border-gray-800 pb-1">
            <span class="uppercase">${c}</span><span>${perf[c].da} DA / ${perf[c].eu} €</span>
        </div>`;
    }
    document.getElementById("performance").innerHTML = html || "En attente de données...";
}

renderPerformance();
</script>
</body>
</html>
