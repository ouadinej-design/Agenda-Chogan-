<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limitless Elite - Manager Pro v3.5</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #fcfcfc; color: #1a1a1a; }
        .gold-gradient { background: linear-gradient(135deg, #D4AF37 0%, #F9E29C 50%, #B8860B 100%); }
        .gold-text { color: #B8860B; }
        .card-prestige { 
            background: white; border-radius: 2.5rem; 
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.12); 
            border: 1px solid rgba(212, 175, 55, 0.05);
            padding: 1.5rem;
        }
        .input-luxe {
            width: 100%; padding: 1.2rem; background: #fff; border-radius: 1.5rem;
            border: 1px solid #f0f0f0; outline: none; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        .nav-active { color: #B8860B !important; transform: scale(1.1); }
        .tab-btn { transition: all 0.3s ease; color: #d1d1d1; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-page { animation: slideUp 0.4s ease-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [view, setView] = useState('agenda');
            const [sales, setSales] = useState(() => JSON.parse(localStorage.getItem('limitless_prestige_data')) || []);

            useEffect(() => {
                localStorage.setItem('limitless_prestige_data', JSON.stringify(sales));
            }, [sales]);

            // --- LOGIQUE STATISTIQUES ---
            const stats = useMemo(() => {
                const init = { DA: { total: 0, clients: {}, cats: {} }, EUR: { total: 0, clients: {}, cats: {} } };
                sales.forEach(s => {
                    const cur = s.currency === '€' ? 'EUR' : 'DA';
                    init[cur].total += s.amount;
                    init[cur].clients[s.client] = (init[cur].clients[s.client] || 0) + s.amount;
                    init[cur].cats[s.category] = (init[cur].cats[s.category] || 0) + s.amount;
                });
                return init;
            }, [sales]);

            // --- LOGIQUE AGENDA ---
            const events = useMemo(() => {
                const base = [
                    { date: "2026-05-31", title: "Fête des Mères", type: "PRESTIGE", icon: "fa-crown", col: "text-pink-500" },
                    { date: "2026-06-16", title: "Aïd al-Adha", type: "RELIGIEUX", icon: "fa-moon", col: "text-green-600" },
                    { date: "2026-11-27", title: "Black Friday", type: "BUSINESS", icon: "fa-fire", col: "text-red-600" }
                ];
                const followUps = sales.map(s => {
                    const d = new Date(s.date); d.setDate(d.getDate() + 30);
                    return { date: d.toISOString().split('T')[0], title: `Relance : ${s.client}`, type: "SUIVI J+30", icon: "fa-phone", col: "text-blue-500" };
                });
                return [...base, ...followUps].sort((a,b) => new Date(a.date) - new Date(b.date));
            }, [sales]);

            const addSale = (e) => {
                e.preventDefault();
                const f = e.target;
                const newS = { id: Date.now(), client: f.client.value, product: f.product.value, category: f.category.value, amount: parseFloat(f.amount.value), currency: f.currency.value, date: new Date().toISOString().split('T')[0] };
                setSales([newS, ...sales]);
                setView('stats');
            };

            return (
                <div className="max-w-md mx-auto min-h-screen pb-40 relative">
                    {/* Header Or & Blanc */}
                    <div className="gold-gradient h-48 rounded-b-[4rem] flex flex-col items-center justify-center text-white shadow-2xl">
                        <h1 className="text-3xl font-bold tracking-[0.2em]">LIMITLESS</h1>
                        <p className="text-[10px] uppercase tracking-[0.4em] opacity-80">Elite Manager Pro</p>
                    </div>

                    <div className="px-6 -mt-10 animate-page">
                        {/* --- AGENDA --- */}
                        {view === 'agenda' && (
                            <div className="space-y-4">
                                <h2 className="text-xl font-bold gold-text italic ml-2 mb-4 underline decoration-gold-500 underline-offset-8">Mon Planning</h2>
                                {events.filter(e => new Date(e.date) >= new Date().setHours(0,0,0,0)).slice(0,6).map((e, i) => (
                                    <div key={i} className="card-prestige flex items-center gap-5">
                                        <div className={`w-12 h-12 rounded-2xl bg-gray-50 flex items-center justify-center ${e.col} shadow-sm text-xl`}>
                                            <i className={`fas ${e.icon}`}></i>
                                        </div>
                                        <div className="flex-1">
                                            <h3 className="font-bold text-sm text-gray-800">{e.title}</h3>
                                            <p className="text-[9px] font-bold text-gray-400 uppercase tracking-tighter">{e.type}</p>
                                        </div>
                                        <span className="gold-text font-bold text-[11px]">{new Date(e.date).toLocaleDateString('fr-FR', {day:'numeric', month:'short'})}</span>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* --- VENTE --- */}
                        {view === 'vente' && (
                            <div className="card-prestige mt-4">
                                <h2 className="text-xl font-bold gold-text mb-8 text-center uppercase tracking-widest">Enregistrement</h2>
                                <form onSubmit={addSale} className="space-y-5">
                                    <input name="client" required className="input-luxe text-sm" placeholder="Nom du Client" />
                                    <input name="product" required className="input-luxe text-sm" placeholder="Produit Chogan" />
                                    <select name="category" className="input-luxe text-sm">
                                        <option>Parfum</option><option>Soins</option><option>Maquillage</option><option>Solaire</option>
                                    </select>
                                    <div className="flex gap-3">
                                        <input name="amount" type="number" required className="flex-1 input-luxe" placeholder="Prix" />
                                        <select name="currency" className="w-24 input-luxe font-bold gold-text">
                                            <option value="DA">DA</option><option value="€">€</option>
                                        </select>
                                    </div>
                                    <button type="submit" className="w-full gold-gradient text-white font-bold py-5 rounded-2xl shadow-xl uppercase tracking-widest mt-4">Valider la Vente</button>
                                </form>
                            </div>
                        )}

                        {/* --- STATS --- */}
                        {view === 'stats' && (
                            <div className="space-y-10">
                                {['DA', 'EUR'].map(cur => (
                                    <div key={cur} className="space-y-6">
                                        <h2 className="text-lg font-bold gold-text italic border-b-2 border-gold-200 inline-block pr-4 pb-1">Performance {cur}</h2>
                                        <div className="bg-slate-900 rounded-[2.5rem] p-8 text-center text-white shadow-2xl">
                                            <p className="text-gold-400 text-[10px] font-bold uppercase tracking-widest opacity-60">Chiffre d'Affaires Total</p>
                                            <p className="text-4xl font-bold mt-2">{stats[cur].total.toLocaleString()} {cur === 'EUR' ? '€' : 'DA'}</p>
                                        </div>

                                        <div className="card-prestige">
                                            <h3 className="text-[10px] font-bold text-gray-400 uppercase mb-5 tracking-widest italic">🏆 Top 3 Clients</h3>
                                            {Object.entries(stats[cur].clients).sort((a,b) => b[1]-a[1]).slice(0,3).map(([n, v], idx) => (
                                                <div key={idx} className="flex justify-between items-center py-3 border-b border-gray-50 last:border-0">
                                                    <span className="text-xs font-semibold text-gray-700">{idx+1}. {n}</span>
                                                    <span className="text-xs font-bold gold-text">{v} {cur === 'EUR' ? '€' : 'DA'}</span>
                                                </div>
                                            ))}
                                        </div>

                                        <div className="card-prestige">
                                            <h3 className="text-[10px] font-bold text-gray-400 uppercase mb-5 tracking-widest italic">📊 Répartition Catégories</h3>
                                            {Object.entries(stats[cur].cats).map(([cat, val]) => (
                                                <div key={cat} className="mb-5 last:mb-0">
                                                    <div className="flex justify-between text-[11px] font-bold mb-2"><span>{cat}</span><span className="gold-text">{val} {cur}</span></div>
                                                    <div className="h-2 bg-gray-100 rounded-full overflow-hidden">
                                                        <div className="h-full gold-gradient rounded-full" style={{width: `${(val/stats[cur].total)*100}%`}}></div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Navigation Luxe */}
                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 backdrop-blur-md flex justify-around items-center py-6 z-50 rounded-t-[3.5rem] shadow-[0_-15px_45px_rgba(0,0,0,0.08)]">
                        <button onClick={() => setView('agenda')} className={`flex flex-col items-center gap-1 tab-btn ${view === 'agenda' ? 'nav-active' : ''}`}>
                            <i className="fas fa-calendar-alt text-2xl"></i>
                            <span className="text-[9px] font-bold uppercase tracking-tighter">Agenda</span>
                        </button>
                        <button onClick={() => setView('vente')} className="relative -mt-24 active:scale-95 transition">
                            <div className="w-20 h-20 gold-gradient rounded-full flex items-center justify-center border-[8px] border-white shadow-2xl">
                                <i className="fas fa-plus text-white text-3xl"></i>
                            </div>
                            <span className="absolute -bottom-8 left-1/2 -translate-x-1/2 text-[9px] font-bold gold-text uppercase tracking-widest">Vendre</span>
                        </button>
                        <button onClick={() => setView('stats')} className={`flex flex-col items-center gap-1 tab-btn ${view === 'stats' ? 'nav-active' : ''}`}>
                            <i className="fas fa-chart-line text-2xl"></i>
                            <span className="text-[9px] font-bold uppercase tracking-tighter">Stats</span>
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
