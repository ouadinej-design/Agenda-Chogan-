<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limitless Team - Chogan CRM Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap');
        :root { --gold: #D4AF37; --luxury-white: #ffffff; }
        body { font-family: 'Montserrat', sans-serif; background-color: #fafafa; color: #1a1a1a; }
        .gold-gradient { background: linear-gradient(135deg, #D4AF37 0%, #B8860B 100%); }
        .font-luxury { font-family: 'Playfair Display', serif; }
        .card { background: white; border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 1.5rem; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); }
        .btn-whatsapp { background-color: #25D366; color: white; transition: all 0.3s ease; }
        .btn-whatsapp:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3); }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(48%) sepia(51%) saturate(542%) hue-rotate(1deg) brightness(93%) contrast(92%); }
    </style>
</head>
<body class="min-h-screen pb-12">

    <header class="gold-gradient text-white p-6 shadow-2xl sticky top-0 z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold uppercase tracking-widest font-luxury">Limitless Team</h1>
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                    <p class="text-[10px] opacity-90 uppercase tracking-tighter">S25 Elite Sync Active</p>
                </div>
            </div>
            <div class="text-right bg-white/20 p-2 rounded-2xl px-5 border border-white/40">
                <p class="text-[9px] font-bold uppercase">Points Elite</p>
                <p id="totalPoints" class="text-xl font-bold">0</p>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">

        <section>
            <h2 class="text-md font-bold mb-3 flex items-center gap-2 font-luxury text-yellow-800 uppercase tracking-wide">
                <i class="fa-solid fa-clock-rotate-left"></i> Alertes Stocks (J-20)
            </h2>
            <div id="holidayAlerts" class="grid grid-cols-2 gap-3">
                </div>
        </section>

        <section class="card p-5">
            <h2 class="text-md font-bold mb-4 font-luxury text-yellow-700 border-b border-yellow-100 pb-2 italic">Nouvelle Vente</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Cliente</label>
                    <input id="clientName" type="text" placeholder="Ex: Nadara" class="w-full border-b border-gray-200 py-2 outline-none focus:border-yellow-600 bg-transparent">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Produit Chogan</label>
                    <input id="productName" type="text" placeholder="Ex: Parfum N°55 Luxe" class="w-full border-b border-gray-200 py-2 outline-none focus:border-yellow-600 bg-transparent">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Date de la transaction</label>
                    <input id="saleDate" type="date" class="w-full border-b border-gray-200 py-2 outline-none focus:border-yellow-600 bg-transparent">
                </div>
                <button onclick="addSale()" class="w-full mt-4 gold-gradient text-white font-bold py-4 rounded-2xl shadow-lg uppercase text-xs tracking-widest active:scale-95 transition">
                    Enregistrer la vente (+10 pts)
                </button>
            </div>
        </section>

        <section class="card overflow-hidden">
            <div class="p-4 bg-yellow-50/50 border-b border-yellow-100 flex justify-between items-center">
                <h2 class="font-bold font-luxury text-yellow-800 text-sm">Prochaines Relances (J+40)</h2>
            </div>
            <div class="max-h-[400px] overflow-y-auto">
                <div id="salesList" class="divide-y divide-gray-100">
                    </div>
            </div>
        </section>

    </main>

    <script>
        let points = parseInt(localStorage.getItem('choganPoints')) || 0;
        let sales = JSON.parse(localStorage.getItem('choganSales')) || [];

        const holidays = [
            { name: "Aïd el-Fitr", date: "2027-03-10", badge: "Luxe" },
            { name: "Fête des Mères", date: "2026-05-31", badge: "Cadeau" },
            { name: "Solaire / Été", date: "2026-06-15", badge: "Saison" },
            { name: "Black Friday", date: "2026-11-27", badge: "Flash" }
        ];

        function init() {
            updatePoints();
            renderHolidays();
            renderSales();
        }

        function renderHolidays() {
            const container = document.getElementById('holidayAlerts');
            holidays.forEach(h => {
                const limit = new Date(h.date);
                limit.setDate(limit.getDate() - 20);
                container.innerHTML += `
                    <div class="bg-white p-3 border border-yellow-100 rounded-2xl shadow-sm">
                        <span class="text-[8px] bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded-full font-bold uppercase">${h.badge}</span>
                        <h3 class="font-bold text-gray-800 text-xs mt-1">${h.name}</h3>
                        <p class="text-[9px] text-red-500 font-bold mt-1 uppercase">Stock J-20 : ${limit.toLocaleDateString('fr-FR')}</p>
                    </div>`;
            });
        }

        function addSale() {
            const name = document.getElementById('clientName').value;
            const product = document.getElementById('productName').value;
            const dateStr = document.getElementById('saleDate').value;

            if(!name || !product || !dateStr) return alert("Champs manquants !");

            const relanceDate = new Date(dateStr);
            relanceDate.setDate(relanceDate.getDate() + 40);

            sales.push({ id: Date.now(), name, product, date: dateStr, relance: relanceDate.toISOString().split('T')[0] });
            points += 10;
            save();
            
            // Effacer formulaire
            document.getElementById('clientName').value = "";
            document.getElementById('productName').value = "";
        }

        function renderSales() {
            const list = document.getElementById('salesList');
            list.innerHTML = "";
            
            if(sales.length === 0) {
                list.innerHTML = "<p class='p-8 text-center text-gray-400 text-xs italic'>Aucune vente enregistrée.</p>";
                return;
            }

            sales.sort((a,b) => new Date(a.relance) - new Date(b.relance));

            sales.forEach(s => {
                const relanceDisplay = new Date(s.relance).toLocaleDateString('fr-FR');
                const msg = `Bonjour ${s.name} ! C'est Marie de Chogan ✨. Ton ${s.product} doit être presque fini après ces 40 jours. On prévoit ton réapprovisionnement ensemble ?`;
                const waUrl = `https://wa.me/?text=${encodeURIComponent(msg)}`;
                
                list.innerHTML += `
                    <div class="p-4 flex justify-between items-center bg-white">
                        <div>
                            <p class="font-bold text-sm text-gray-800">${s.name}</p>
                            <p class="text-[10px] text-gray-400">${s.product} - Achat: ${new Date(s.date).toLocaleDateString('fr-FR')}</p>
                            <p class="text-[10px] font-bold text-yellow-600 mt-1">Relance : ${relanceDisplay}</p>
                        </div>
                        <a href="${waUrl}" target="_blank" onclick="points+=15;save()" class="btn-whatsapp px-4 py-2 rounded-xl text-[10px] font-bold uppercase flex items-center gap-1 shadow-sm">
                            <i class="fa-brands fa-whatsapp text-sm"></i> Relancer
                        </a>
                    </div>`;
            });
        }

        function save() {
            localStorage.setItem('choganPoints', points);
            localStorage.setItem('choganSales', JSON.stringify(sales));
            updatePoints();
            renderSales();
        }

        function updatePoints() { document.getElementById('totalPoints').innerText = points; }

        init();
    </script>
</body>
</html>
