<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limitless Elite - V5.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap');
        body { background:#fdfdfd; font-family: 'Montserrat', sans-serif; color: #333; padding-bottom: 60px; }
        .font-luxury { font-family: 'Playfair Display', serif; }
        .gold-gradient { background: linear-gradient(135deg, #D4AF37 0%, #B8860B 100%); }
        .card { background:white; border-radius:25px; padding:20px; margin-bottom:20px; border: 1px solid rgba(212,175,55,0.15); box-shadow: 0 10px 25px rgba(0,0,0,0.02); }
        
        /* Agenda - Structure fixe visuel 17916 */
        .agenda-row { display: flex; align-items: center; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #f5f5f5; }
        .agenda-info { flex: 1; display: flex; flex-direction: column; align-items: center; text-align: center; }
        
        .event-tag { font-size: 7px; padding: 2px 8px; border-radius: 8px; text-transform: uppercase; font-weight: bold; margin-bottom: 4px; color: white; }
        .bg-prepa { background: #7c3aed; }
        .bg-fete { background: #10b981; }

        input, select { border-bottom: 1px solid #eee !important; border: none; outline: none; width: 100%; padding: 12px; font-size: 14px; margin-bottom: 8px; background: transparent; }
        
        /* Label Doré - Fixé visuel 17918 */
        .label-gold { font-size: 9px; font-weight: bold; color: #bca05d; text-transform: uppercase; margin: 15px 0 5px 0; display: block; text-align: center; letter-spacing: 1px; }
        
        .date-col { font-size: 9px; color: #9ca3af; font-weight: 600; width: 70px; }
        .j-col { font-weight: bold; color: #4b5563; font-size: 11px; width: 45px; text-align: right; }
    </style>
</head>
<body class="p-4">

<div class="max-w-md mx-auto">
    <div class="text-center mb-6">
        <h1 class="font-luxury text-3xl font-bold text-yellow-700 tracking-tight">LIMITLESS ELITE</h1>
        <div class="inline-block bg-gray-100 text-[8px] font-bold px-4 py-1 rounded-full uppercase tracking-widest text-gray-400 mt-1">Tableau de Bord Stratégique</div>
    </div>

    <div class="card border-t-4 border-t-yellow-600">
        <h2 class="font-luxury text-sm font-bold mb-4 text-gray-800 uppercase flex justify-center items-center gap-2">
            <i class="fa-solid fa-calendar-day text-yellow-600"></i> Planning & Anticipation
        </h2>
        <div id="calendar-box" class="min-height-[200px]">
            </div>
    </div>

    <div class="card shadow-lg">
        <h2 class="font-luxury text-md mb-4 text-gray-700 italic border-b pb-2 text-center">Nouvelle Vente</h2>
        <input id="cons" placeholder="Nom de la consultante">
        <input id="cli" placeholder="Nom de la cliente">
        <input id="prd" placeholder="Produit Chogan">
        <div class="flex gap-2">
            <input id="amt" type="number" placeholder="Montant" class="flex-1">
            <select id="cur" class="w-24">
                <option value="DA">DA</option>
                <option value="€">€</option>
            </select>
        </div>
        
        <span class="label-gold">SÉLECTIONNER UNE DATE D'ACHAT</span>
        <input id="vDate" type="date">
        
        <button onclick="saveSale()" class="gold-gradient text-white w-full p-4 rounded-2xl font-bold text-[11px] uppercase tracking-widest shadow-md mt-2">Enregistrer Transaction</button>
    </div>

    <div class="card bg-black text-white">
        <h2 class="text-yellow-500 font-luxury text-[10px] font-bold uppercase tracking-widest mb-4 italic text-center">Performance Équipe</h2>
        <div id="performance" class="space-y-3 text-[11px]"></div>
    </div>
</div>

<script>
// Données de base
const holidays = [
    { n:"Aïd el-Adha", d:"2026-05-27" },
    { n:"Fête des Mères 🌸", d:"2026-05-31" },
    { n:"Saison Solaire ☀️", d:"2026-06-15" },
    { n:"Fête des Pères", d:"2026-06-21" },
    { n:"Black Friday 🔥", d:"2026-11-27" },
    { n:"Noël 🎄", d:"2026-12-25" }
];

function renderAgenda() {
    const container = document.getElementById("calendar-box");
    const now = new Date(); now.setHours(0,0,0,0);
    let items = [];

    // Création des lignes agenda
    holidays.forEach(h => {
        // La fête elle-même
        items.push({ n: h.n, d: h.d, t: "bg-fete", lbl: "Fête" });
        // Le rappel J-20
        let pD = new Date(h.d); pD.setDate(pD.getDate() - 20);
        items.push({ n: `📦 PRÉPA STOCK : ${h.n}`, d: pD.toISOString().split('T')[0], t: "bg-prepa", lbl: "Rappel J-20" });
    });

    // Ajout des relances clients si elles existent
    let sales = JSON.parse(localStorage.getItem("sales")) || [];
    sales.forEach(s => {
        let rDate = new Date(s.dat); rDate.setDate(rDate.getDate() + 40);
        items.push({ n: `RELANCE : ${s.cli}`, d: rDate.toISOString().split('T')[0], t: "bg-fete", lbl: "Relance" });
    });

    items.sort((a,b) => new Date(a.d) - new Date(b.d));

    let html = "";
    items.forEach(i => {
        let dObj = new Date(i.d);
        let diff = Math.ceil((dObj - now) / 86400000);
        if(diff < -2) return;

        html += `
        <div class="agenda-row ${diff < 0 ? 'opacity-30' : ''}">
            <div class="date-col">${dObj.toLocaleDateString('fr-FR')}</div>
            <div class="agenda-info">
                <span class="event-tag ${i.t}">${i.lbl}</span>
                <span class="font-bold text-gray-700 uppercase text-[9px] tracking-tight">${i.n}</span>
            </div>
            <div class="j-col">${diff < 0 ? 'OK' : 'J-' + diff}</div>
        </div>`;
    });
    container.innerHTML = html;
}

function saveSale() {
    const dat = document.getElementById("vDate").value;
    if(!dat) return alert("Veuillez sélectionner une date");
    
    let sales = JSON.parse(localStorage.getItem("sales")) || [];
    sales.push({
        cons: document.getElementById("cons").value,
        cli: document.getElementById("cli").value,
        amt: document.getElementById("amt").value,
        cur: document.getElementById("cur").value,
        dat: dat
    });
    localStorage.setItem("sales", JSON.stringify(sales));
    renderAgenda();
    renderPerformance();
}

function renderPerformance() {
    let sales = JSON.parse(localStorage.getItem("sales")) || [];
    let perf = {};
    sales.forEach(s => {
        if(!perf[s.cons]) perf[s.cons] = { da: 0, eu: 0 };
        if(s.cur === "DA") perf[s.cons].da += parseFloat(s.amt)||0; 
        else perf[s.cons].eu += parseFloat(s.amt)||0;
    });
    let html = "";
    for(let c in perf) {
        html += `<div class="flex justify-between border-b border-gray-800 pb-1">
            <span>${c}</span><span>${perf[c].da} DA / ${perf[c].eu} €</span>
        </div>`;
    }
    document.getElementById("performance").innerHTML = html || "Aucune vente.";
}

// EXECUTION IMMÉDIATE
renderAgenda();
renderPerformance();
</script>
</body>
</html>
