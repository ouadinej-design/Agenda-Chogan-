<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Wallet Chogan Premium</title>

<script>
/* 🔧 CONFIGURATION */
const ACCESS_CODE = "CHOGAN2024";           
const ADMIN_EMAIL = "ouadi.nej@gmail.com"; 
const W3F_KEY     = "04e1ce0c-3c62-413d-ab06-7fdfe1afd91a"; 
</script>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0c0c14; --surface:#16161f; --card:#1e1e2a;
  --text:#fff;  --muted:rgba(255,255,255,.48);
  --gold:#c9a84c; --gold2:#e8c870;
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);
  font-family:-apple-system,'Helvetica Neue',sans-serif;color:var(--text)}

/* TITRE SECTION */
.header-area{padding:calc(40px + var(--st)) 25px 10px; display:flex; justify-content:space-between; align-items:center;}
.header-area h1{font-size:34px; font-weight:900; letter-spacing:-1px;}

/* NAVIGATION PILLS */
.wallet-nav{display:flex;gap:12px;padding:15px 25px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.wallet-nav::-webkit-scrollbar{display:none}
.pill{padding:12px 20px;border-radius:30px;background:rgba(255,255,255,.08);border:0.5px solid rgba(255,255,255,.12);color:var(--muted);font-size:12px;font-weight:800;white-space:nowrap;transition:0.3s;text-transform:uppercase;letter-spacing:1px}
.pill.active{background:var(--gold);color:#000;border-color:var(--gold);box-shadow:0 4px 20px rgba(201,168,76,0.4)}

/* ELEVATOR / CARTES ÉLARGIES */
.elevator{flex:1;overflow-y:auto;position:relative;padding-bottom:200px;margin-top:10px;}
.elevator::-webkit-scrollbar{display:none}

.wcard{position:absolute;left:18px;right:18px;height:240px;border-radius:35px;overflow:hidden;box-shadow:0 15px-40px rgba(0,0,0,0.7);transition:transform 0.4s cubic-bezier(0.2, 1, 0.3, 1)}
.ci{padding:30px;height:100%;display:flex;flex-direction:column;justify-content:space-between}
.ct-n{font-size:30px;font-weight:900;letter-spacing:-1.2px;line-height:1;margin-top:5px;width:80%}
.ct-c{font-size:12px;text-transform:uppercase;opacity:0.8;font-weight:800;letter-spacing:1.8px;margin-bottom:8px}

/* COLORS D'APRÈS TES CAPTURES */
.t1{background:linear-gradient(135deg,#1c327a,#0a153a)}
.t2{background:linear-gradient(135deg,#5a1c8b,#2a0a4a)}
.t3{background:linear-gradient(135deg,#065a3c,#032b1d)}
.t4{background:linear-gradient(135deg,#12586e,#082a35)}
.t5{background:linear-gradient(135deg,#844c0d,#412506)}
.t6{background:linear-gradient(135deg,#951c1c,#4a0a0a)}

/* SHEET DETAIL */
#dpanel{position:fixed;inset:0;z-index:100;pointer-events:none}
#dov{position:absolute;inset:0;background:rgba(0,0,0,0);transition:0.4s}
#dsheet{position:absolute;bottom:0;left:0;right:0;background:#13131d;border-radius:40px 40px 0 0;transform:translateY(100%);transition:0.5s cubic-bezier(0.16, 1, 0.3, 1);max-height:90vh;overflow-y:auto;padding:35px}
#dpanel.open{pointer-events:all}
#dpanel.open #dov{background:rgba(0,0,0,0.85)}
#dpanel.open #dsheet{transform:translateY(0)}

.btn-g{width:100%;padding:20px;border-radius:20px;background:linear-gradient(135deg,#c9a84c,#8b5e1a);border:none;color:#fff;font-size:18px;font-weight:900;margin-top:20px}
.finput{width:100%;background:var(--card);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:22px;color:#fff;margin-bottom:15px;text-align:center;font-size:22px;letter-spacing:4px}
#toast{position:fixed;top:60px;left:25px;right:25px;padding:20px;border-radius:20px;text-align:center;transform:translateY(-300%);transition:0.6s;z-index:999;font-weight:900}
#toast.show{transform:translateY(0)}
</style>
</head>
<body>

<div id="lock" class="screen">
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center">
        <div style="font-size:80px">🔱</div>
        <h2 style="margin-top:30px; letter-spacing:3px; font-weight:900">CHOGAN PRO</h2>
    </div>
    <div style="padding:40px;background:var(--surface);border-radius:45px 45px 0 0">
        <input class="finput" id="uc" type="password" placeholder="••••">
        <button class="btn-g" onclick="tryUnlock()">DÉVERROUILLER</button>
    </div>
</div>

<div id="main" class="screen hidden">
    <div class="header-area">
        <h1 id="wh-title">Catalogue</h1>
        <div onclick="avTap()" style="width:50px;height:50px;border-radius:50%;background:var(--gold);color:#000;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;cursor:pointer;box-shadow:0 0 20px rgba(201,168,76,0.3)">WC</div>
    </div>

    <div class="wallet-nav">
        <div class="pill" id="p-knowledge" onclick="switchWallet('knowledge')">🧠 Guide Vente</div>
        <div class="pill active" id="p-products" onclick="switchWallet('products')">🛍️ Produits</div>
        <div class="pill" id="p-scripts" onclick="switchWallet('scripts')">🤝 Collab</div>
    </div>

    <div class="elevator" id="stack"></div>
</div>

<div id="dpanel">
    <div id="dov" onclick="cls()"></div>
    <div id="dsheet">
        <div style="width:60px;height:6px;background:rgba(255,255,255,0.2);margin:0 auto 30px;border-radius:3px"></div>
        <div id="sc"></div>
    </div>
</div>

<div id="toast"></div>

<script>
const WALLETS = {
    knowledge: [
        { t: "S - Sécurité", s: "SONCAS", c: "t1", e: "🛡️", items: [
            { n: "Argument TENUE", d: "Extraits à 30% d'essence. Tenue 8h-24h garantie.", q: "SÉCURITÉ" },
            { n: "Argument QUALITÉ", d: "Certifications BIO, SCIC, non testé sur les animaux.", q: "SÉCURITÉ" }
        ]},
        { t: "O - Orgueil", s: "SONCAS", c: "t2", e: "👑", items: [
            { n: "Prestige", d: "Luxe sans marketing. Gamme Luxury flacons or.", q: "ORGUEIL" }
        ]},
        { t: "N - Nouveauté", s: "SONCAS", c: "t3", e: "✨", items: [
            { n: "Tendance", d: "Dernières sorties haute couture chaque mois.", q: "NOUVEAUTÉ" }
        ]},
        { t: "C - Confort", s: "SONCAS", c: "t4", e: "🛋️", items: [
            { n: "Service", d: "Livraison domicile et conseil sur-mesure.", q: "CONFORT" }
        ]},
        { t: "A - Argent", s: "SONCAS", c: "t5", e: "💰", items: [
            { n: "Économie", d: "Prix direct usine. 3 à 4 fois moins cher.", q: "ARGENT" }
        ]},
        { t: "S - Sympathie", s: "SONCAS", c: "t6", e: "🤝", items: [
            { n: "Éthique", d: "Entreprise familiale, produits naturels.", q: "SYMPATHIE" }
        ]}
    ],
    products: [
        { t: "Parfumerie Expert", s: "Catégorie 01", c: "t1", e: "🧴", items: [
            { n: "Extrait de Parfum", d: "Concentration à 30%. Essence de Grasse pure.", q: "PRODUIT" }
        ]},
        { t: "Visage & Corps", s: "Catégorie 02", c: "t2", e: "✨", items: [
            { n: "Bave d'Escargot", d: "Régénère, traite acné et cicatrices.", q: "SOIN" }
        ]},
        { t: "Maison / Entretien", s: "Catégorie 03", c: "t3", e: "🏠", items: [
            { n: "Bagnolux", d: "Anti-calcaire pro. Brillance instantanée.", q: "HOME" }
        ]},
        { t: "Maquillage Pro", s: "Catégorie 04", c: "t2", e: "💄", items: [
            { n: "Lipstick Mat", d: "Sans transfert, tenue 12h.", q: "MAKE-UP" }
        ]},
        { t: "Hygiène & Soins", s: "Catégorie 05", c: "t5", e: "🌿", items: [
            { n: "Huile de Neem", d: "Soin antibactérien peaux fragiles.", q: "SOIN" }
        ]},
        { t: "Solaire & Nutrition", s: "Catégorie 06", c: "t3", e: "☀️", items: [
            { n: "Protection UV", d: "Filtres haute performance bronzage doré.", q: "ÉTÉ" }
        ]}
    ],
    scripts: [
        { t: "Coiffeur / Barbier", s: "Prospection B2B", c: "t1", e: "💇", items: [
            { n: "Collaboration", d: "Générez 50% de marge sur la revente client.", q: "B2B" }
        ]},
        { t: "Institut de Beauté", s: "Prospection B2B", c: "t2", e: "🧖", items: [
            { n: "Collaboration", d: "Gamme Bio pour soins cabine et revente.", q: "B2B" }
        ]},
        { t: "Fleuriste / Déco", s: "Prospection B2B", c: "t3", e: "💐", items: [
            { n: "Collaboration", d: "Vente croisée : Fleurs + Parfums Maison.", q: "B2B" }
        ]},
        { t: "Salle de Sport", s: "Prospection B2B", c: "t4", e: "🏋️", items: [
            { n: "Collaboration", d: "Parfums sac de sport et sprays textiles.", q: "B2B" }
        ]}
    ]
};

let currentWallet = 'products';
let history = [];

function tryUnlock() {
    if(document.getElementById('uc').value.toUpperCase() === ACCESS_CODE || document.getElementById('uc').value === "2024") {
        document.getElementById('lock').classList.add('hidden');
        document.getElementById('main').classList.remove('hidden');
        switchWallet('products');
    } else { toast("CODE INCORRECT", "#ff5050"); }
}

function switchWallet(key) {
    currentWallet = key;
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    document.getElementById('p-'+key).classList.add('active');
    
    const titles = {knowledge:"Guide Vente", products:"Catalogue", scripts:"Prospection"};
    document.getElementById('wh-title').textContent = titles[key];
    
    buildStack();
}

function buildStack() {
    const stack = document.getElementById('stack');
    stack.innerHTML = '';
    const data = WALLETS[currentWallet];
    
    data.forEach((cat, i) => {
        const card = document.createElement('div');
        card.className = `wcard ${cat.c}`;
        card.style.top = (i * 75) + "px"; // Espacement des cartes élancées
        card.style.zIndex = i;
        card.onclick = () => openCard(i);
        card.innerHTML = `<div class="ci">
            <div style="display:flex;justify-content:space-between; align-items:flex-start;">
                <div style="flex:1"><div class="ct-c">${cat.s}</div><div class="ct-n">${cat.t}</div></div>
                <div style="font-size:45px; filter:drop-shadow(0 5px 10px rgba(0,0,0,0.3))">${cat.e}</div>
            </div>
            <div style="font-size:12px; font-weight:900; letter-spacing:1px; color:rgba(255,255,255,0.6)">OUVRIR LA CARTE →</div>
        </div>`;
        stack.appendChild(card);
    });
}

function openCard(idx) {
    const cat = WALLETS[currentWallet][idx];
    history.push(cat.t);
    document.getElementById('sc').innerHTML = `
        <h2 style="margin-bottom:30px; font-size:32px; font-weight:900; color:var(--gold); line-height:1.1">${cat.t}</h2>
        ${cat.items.map(it => `
            <div style="background:var(--card);padding:25px;border-radius:25px;margin-bottom:20px;border-left:6px solid var(--gold);box-shadow:0 8px 20px rgba(0,0,0,0.3)">
                <div style="font-size:12px;color:var(--gold);font-weight:900;text-transform:uppercase;letter-spacing:1.5px">${it.q}</div>
                <div style="font-weight:900;margin:10px 0;font-size:20px;color:#fff">${it.n}</div>
                <div style="font-size:16px;color:rgba(255,255,255,0.7);line-height:1.6">${it.d}</div>
            </div>
        `).join('')}
        <button class="btn-g" onclick="cls()">RETOUR</button>
    `;
    document.getElementById('dpanel').classList.add('open');
}

function cls() { document.getElementById('dpanel').classList.remove('open'); }

function toast(m, c) {
    const t = document.getElementById('toast');
    t.textContent = m; t.style.background = c;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

async function avTap() {
    if(confirm("Envoyer le rapport d'activité ?")) {
        try {
            await fetch('https://api.web3forms.com/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ access_key: W3F_KEY, to: ADMIN_EMAIL, message: "Consultations : " + history.join(", ") })
            });
            toast("ENVOYÉ ✅", "#32c864");
            history = [];
        } catch(e) { toast("ERREUR", "#ff5050"); }
    }
}
</script>
</body>
</html>
