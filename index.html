<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limitless Elite - Manager Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #fdfdfd; color: #1a1a1a; }
        .gold-gradient { background: linear-gradient(135deg, #D4AF37 0%, #F9E29C 50%, #B8860B 100%); }
        .gold-text { background: linear-gradient(135deg, #B8860B 0%, #D4AF37 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card-luxury { background: white; border-radius: 1.5rem; box-shadow: 0 10px 25px rgba(212, 175, 55, 0.1); border: 1px solid rgba(212, 175, 55, 0.2); }
        .nav-active { color: #B8860B !important; transform: scale(1.1); }
        .tab-btn { transition: all 0.3s ease; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('agenda');
            
            // --- ÉTATS DES DONNÉES ---
            const [sales, setSales] = useState(() => {
                const saved = localStorage.getItem('limitless_sales_v3');
                return saved ? JSON.parse(saved) : [];
            });

            const [events, setEvents] = useState(() => {
                const saved = localStorage.getItem('limitless_events_v3');
                const defaultEvents = [
                    { id: 1, title: "Pré-commandes : Fête des Mères", date: "2026-05-04", type: "J-20", icon: "fa-clock" },
                    { id: 2, title: "Aïd al-Adha", date: "2026-06-16", type: "Événement", icon: "fa-star-and-crescent" }
                ];
                return saved ? JSON.parse(saved) : defaultEvents;
            });

            // Sauvegarde automatique
            useEffect(() => {
                localStorage.setItem('limitless_sales_v3', JSON.stringify(sales));
                localStorage.setItem('limitless_events_v3', JSON.stringify(events));
            }, [sales, events]);

            // --- CALCULS STATS SÉPARÉS ---
            const statsDA = sales.filter(s => s.currency === 'DA');
            const statsEUR = sales.filter(s => s.currency === '€');

            const totalDA = statsDA.reduce((acc, s) => acc + s.amount, 0);
            const totalEUR = statsEUR.reduce((acc, s) => acc + s.amount, 0);

            // --- ACTIONS ---
            const addSale = (e) => {
                e.preventDefault();
                const form = e.target;
                const newSale = {
                    id: Date.now(),
                    client: form.client.value,
                    product: form.product.value,
                    amount: parseFloat(form.amount.value),
                    currency: form.currency.value,
                    date: new Date().toLocaleDateString('fr-FR')
                };
                setSales([newSale, ...sales]);
                form.reset();
                setView('stats');
            };

            const addEvent = (e) => {
                e.preventDefault();
                const form = e.target;
                const newEv = {
                    id: Date.now(),
                    title: form.title.value,
                    date: form.date.value,
                    type: form.type.value,
                    icon: "fa-calendar-star"
                };
                setEvents([newEv, ...events]);
                form.reset();
                setView('agenda');
            };

            return (
                <div className="max-w-md mx-auto min-h-screen pb-28 bg-gray-50 relative shadow-2xl">
                    {/* HEADER */}
                    <header className="gold-gradient p-8 rounded-b-[3rem] text-center shadow-lg mb-4">
                        <h1 className="text-white text-2xl font-bold tracking-[0.2em]">LIMITLESS ELITE</h1>
                        <p className="text-white/80 text-[10px] uppercase tracking-widest">Manager Pro v3.0</p>
                    </header>

                    <main className="px-5">
                        
                        {/* 1. AGENDA + AJOUT ÉVÉNEMENT */}
                        {view === 'agenda' && (
                            <div className="space-y-4 animate-fadeIn">
                                <div className="flex justify-between items-center mb-2">
                                    <h2 className="text-lg font-bold gold-text">Planning Stratégique</h2>
                                    <button onClick={() => setView('addEvent')} className="text-[10px] font-bold bg-white border border-gold-500 px-3 py-1 rounded-full gold-text uppercase">
                                        + Ajouter Événement
                                    </button>
                                </div>
                                {events.sort((a,b) => new Date(a.date) - new Date(b.date)).map(ev => (
                                    <div key={ev.id} className="card-luxury p-4 flex items-center gap-4 border-l-4 border-l-[#B8860B]">
                                        <div className="w-10 h-10 rounded-full bg-yellow-50 flex items-center justify-center">
                                            <i className={`fas ${ev.icon} text-yellow-600`}></i>
                                        </div>
                                        <div>
                                            <p className="font-bold text-sm">{ev.title}</p>
                                            <p className="text-[10px] text-gray-400 uppercase font-bold">{ev.type} • {ev.date}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* 2. FORMULAIRE AJOUT ÉVÉNEMENT */}
                        {view === 'addEvent' && (
                            <div className="card-luxury p-6 animate-slideUp">
                                <h2 className="text-lg font-bold gold-text mb-4 underline">Nouvel Événement</h2>
                                <form onSubmit={addEvent} className="space-y-4">
                                    <input name="title" required className="w-full p-4 bg-gray-50 rounded-xl outline-none border border-gray-100" placeholder="Titre (ex: Salon Expo...)" />
                                    <input name="date" type="date" required className="w-full p-4 bg-gray-50 rounded-xl outline-none" />
                                    <select name="type" className="w-full p-4 bg-gray-50 rounded-xl outline-none">
                                        <option value="Événement">Événement</option>
                                        <option value="Pre-order">Pré-commande (J-20)</option>
                                        <option value="Meeting">Réunion Team</option>
                                    </select>
                                    <button type="submit" className="w-full gold-gradient text-white font-bold py-4 rounded-xl shadow-md">PROGRAMMER</button>
                                </form>
                            </div>
                        )}

                        {/* 3. VENTES + DEVISES */}
                        {view === 'vente' && (
                            <div className="card-luxury p-6 animate-slideUp">
                                <h2 className="text-lg font-bold gold-text mb-6">Enregistrement Vente</h2>
                                <form onSubmit={addSale} className="space-y-4">
                                    <input name="client" required className="w-full p-4 bg-gray-50 rounded-xl border-none shadow-inner" placeholder="Nom du Client" />
                                    <input name="product" required className="w-full p-4 bg-gray-50 rounded-xl border-none shadow-inner" placeholder="Produit Chogan" />
                                    
                                    <div className="flex gap-2">
                                        <input name="amount" type="number" required className="flex-1 p-4 bg-gray-50 rounded-xl border-none shadow-inner" placeholder="Montant" />
                                        <select name="currency" className="p-4 bg-white border border-yellow-500 rounded-xl font-bold">
                                            <option value="DA">DA (DZ)</option>
                                            <option value="€">€ (EUR)</option>
                                        </select>
                                    </div>

                                    <button type="submit" className="w-full gold-gradient text-white font-bold py-4 rounded-xl shadow-lg uppercase tracking-widest">Valider la Vente</button>
                                </form>
                            </div>
                        )}

                        {/* 4. STATISTIQUES SÉPARÉES */}
                        {view === 'stats' && (
                            <div className="space-y-6 animate-fadeIn">
                                <h2 className="text-lg font-bold gold-text">Tableau de Bord</h2>
                                
                                {/* Totaux Graphiques Séparés */}
                                <div className="grid grid-cols-1 gap-4">
                                    <div className="bg-slate-900 rounded-[2rem] p-6 text-center border-b-4 border-yellow-500 shadow-xl">
                                        <p className="text-yellow-500 text-[10px] font-bold uppercase tracking-widest">Total Algérie (DA)</p>
                                        <p className="text-white text-3xl font-bold">{totalDA.toLocaleString()} <span className="text-sm">DA</span></p>
                                    </div>
                                    <div className="bg-slate-800 rounded-[2rem] p-6 text-center border-b-4 border-blue-400 shadow-xl">
                                        <p className="text-blue-400 text-[10px] font-bold uppercase tracking-widest">Total Europe (€)</p>
                                        <p className="text-white text-3xl font-bold">{totalEUR.toLocaleString()} <span className="text-sm">€</span></p>
                                    </div>
                                </div>

                                {/* Historique */}
                                <div className="card-luxury p-6">
                                    <h3 className="font-bold text-sm mb-4 border-b pb-2">Historique des Transactions</h3>
                                    <div className="space-y-3">
                                        {sales.map(s => (
                                            <div key={s.id} className="flex justify-between items-center text-xs border-b border-gray-50 pb-2">
                                                <div>
                                                    <p className="font-bold">{s.client}</p>
                                                    <p className="text-gray-400">{s.product}</p>
                                                </div>
                                                <p className={`font-bold ${s.currency === '€' ? 'text-blue-600' : 'text-yellow-600'}`}>
                                                    {s.amount} {s.currency}
                                                </p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* NAVIGATION BAR */}
                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/90 backdrop-blur-md border-t border-gray-100 flex justify-around py-4 z-50">
                        <button onClick={() => setView('agenda')} className={`flex flex-col items-center gap-1 tab-btn ${view === 'agenda' || view === 'addEvent' ? 'nav-active' : 'text-gray-300'}`}>
                            <i className="fas fa-calendar-alt text-xl"></i>
                            <span className="text-[9px] font-bold uppercase">Agenda</span>
                        </button>
                        <button onClick={() => setView('vente')} className={`flex flex-col items-center gap-1 tab-btn ${view === 'vente' ? 'nav-active' : 'text-gray-300'}`}>
                            <div className="w-10 h-10 gold-gradient rounded-full flex items-center justify-center -mt-8 border-4 border-white shadow-md">
                                <i className="fas fa-plus text-white"></i>
                            </div>
                            <span className="text-[9px] font-bold uppercase">Vente</span>
                        </button>
                        <button onClick={() => setView('stats')} className={`flex flex-col items-center gap-1 tab-btn ${view === 'stats' ? 'nav-active' : 'text-gray-300'}`}>
                            <i className="fas fa-chart-pie text-xl"></i>
                            <span className="text-[9px] font-bold uppercase">Stats</span>
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
