<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chogan CRM Elite</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body { background:#fafafa; font-family: Arial }
.card { background:white; border-radius:16px; padding:12px; margin-bottom:10px; }
</style>
</head>

<body class="p-3">

<div class="max-w-md mx-auto">

<h1 class="text-xl font-bold text-center mb-4">CRM ELITE</h1>

<!-- FORM -->
<div class="card">
<input id="name" placeholder="Cliente" class="border p-2 w-full mb-2">
<input id="product" placeholder="Produit" class="border p-2 w-full mb-2">
<input id="date" type="date" class="border p-2 w-full mb-2">

<button onclick="addSale()" class="bg-yellow-500 text-white w-full p-2 rounded">
Ajouter vente
</button>
</div>

<!-- STAT MANAGER -->
<div class="card">
<h2 class="font-bold mb-2">📊 Stats Consultantes</h2>
<div id="stats"></div>
</div>

<!-- FETES ANNUELLES -->
<div class="card">
<h2 class="font-bold mb-2">📅 Vision Année (Fêtes)</h2>
<div id="calendar"></div>
</div>

<!-- SALES -->
<div id="list"></div>

</div>

<script>

let sales = JSON.parse(localStorage.getItem("sales")) || [];

/* =======================
   WHATSAPP MESSAGE TEMPLATE
======================= */
function whatsappMsg(name, product){
return `Bonjour ${name} ✨

J’espère que tu vas bien.

Je reviens vers toi concernant ton ${product} 🌸

Après quelques semaines, il est peut-être bientôt terminé ou tu commences à t’y habituer.

Je peux te proposer un réassort ou un produit équivalent adapté à ton besoin 💖

Dis-moi si tu veux que je te conseille 😊`;
}

/* =======================
   FÊTES ANNUELLES (COMPLET)
======================= */
const holidays = [
{ name:"Nouvel An", date:"01-01" },
{ name:"Aïd el-Fitr", date:"variable" },
{ name:"Aïd el-Adha", date:"variable" },
{ name:"Fête du Travail", date:"05-01" },
{ name:"Fête de l’Indépendance", date:"07-05" },
{ name:"Achoura", date:"variable" },
{ name:"Rentrée Septembre", date:"09-01" },
{ name:"Halloween", date:"10-31" },
{ name:"Black Friday", date:"11-28" },
{ name:"Noël", date:"12-25" }
];

function renderCalendar(){
let html="";
holidays.forEach(h=>{
html+=`<p>📌 ${h.name} → ${h.date}</p>`;
});
document.getElementById("calendar").innerHTML=html;
}

/* =======================
   ADD SALE
======================= */
function addSale(){
let name=document.getElementById("name").value;
let product=document.getElementById("product").value;
let date=document.getElementById("date").value;

if(!name||!product||!date) return alert("Remplir tous les champs");

let relance=new Date(date);
relance.setDate(relance.getDate()+40);

sales.push({
id:Date.now(),
name,
product,
date,
relance:relance.toISOString().split("T")[0],
consultant:"ouadi.nej@gmail.com"
});

save();
}

/* =======================
   SAVE
======================= */
function save(){
localStorage.setItem("sales",JSON.stringify(sales));
render();
}

/* =======================
   STATS MANAGER
======================= */
function renderStats(){

let total=sales.length;
let urgent=0;

sales.forEach(s=>{
let r=new Date(s.relance);
let today=new Date();
let diff=(r-today)/(1000*60*60*24);
if(diff<=3) urgent++;
});

document.getElementById("stats").innerHTML=`
<p>Total ventes: ${total}</p>
<p>Urgent (J-3): ${urgent}</p>
<p>Manager: ouadi.nej@gmail.com</p>
`;
}

/* =======================
   NOTIFICATIONS (J-20 / J+40)
======================= */
function notify(){
if(Notification.permission!=="granted"){
Notification.requestPermission();
return;
}

sales.forEach(s=>{
let r=new Date(s.relance);
let today=new Date();
let diff=Math.floor((r-today)/(1000*60*60*24));

if(diff<=20 && diff>=0){
new Notification("🔔 Relance cliente",{
body:`${s.name} - ${s.product} à relancer`
});
}
});
}

/* =======================
   RENDER SALES
======================= */
function render(){
let html="";

sales.forEach(s=>{

let msg=whatsappMsg(s.name,s.product);
let url=`https://wa.me/?text=${encodeURIComponent(msg)}`;

html+=`
<div class="card">
<p><b>${s.name}</b></p>
<p>${s.product}</p>
<p>Relance: ${s.relance}</p>

<a href="${url}" target="_blank"
class="bg-green-500 text-white p-2 block text-center rounded mt-2">
📲 Envoyer WhatsApp
</a>
</div>
`;
});

document.getElementById("list").innerHTML=html;

renderStats();
notify();
}

/* INIT */
renderCalendar();
render();
setInterval(notify,60000);

</script>

</body>
</html>
