
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limitless Elite - V4.8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap');
        body { background:#fdfdfd; font-family: 'Montserrat', sans-serif; color: #333; padding-bottom: 60px; }
        .font-luxury { font-family: 'Playfair Display', serif; }
        .gold-gradient { background: linear-gradient(135deg, #D4AF37 0%, #B8860B 100%); }
        .card { background:white; border-radius:25px; padding:20px; margin-bottom:20px; border: 1px solid rgba(212,175,55,0.15); box-shadow: 0 10px 25px rgba(0,0,0,0.02); }
        
        /* Agenda Stylisé & Centré */
        .agenda-container { min-height: 100px; max-height: 400px; overflow-y: auto; display: block !important; }
        .agenda-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 8px; border-bottom: 1px solid #f9f9f9; }
        .agenda-center { flex: 1; display: flex; flex-direction: column; align-items: center; text-align: center; }
        
        .event-tag { font-size: 7px; padding: 2px 8px; border-radius: 10px; text-transform: uppercase; font-weight: bold; margin-bottom: 4px; color: white; }
        .bg-prepa { background: #7c3aed; }
        .bg-fete { background: #10b981; }
        .bg-salon { background: #ef4444; }
        .bg-relance { background: #f59e0b; }

        input, select { border-bottom: 1px solid #eee !important; border: none; outline: none; width: 100%; padding: 12px; font-size: 14px; margin-bottom: 8px; background: transparent; }
        
        /* Intitulé sélection de date selon capture 17918.jpg */
        .label-gold { font-size: 10px; font-weight: bold; color: #bca05d; text-transform: uppercase; margin: 10px 0 5px 0; display: block; text-align: center; letter-spacing: 0.5px; }
        
        .past { opacity: 0.3; filter: grayscale(1); }
        .date-col { font-size: 9px; color: #9ca3af; font-weight: 600; width: 65px; }
        .j-col { font-weight: bold; color: #4b5563; font-size: 11px; width: 45px; text-align: right; }
    </style>
</head>
<body class="p-4">

<div class="max-w-md mx-auto">
    <div class="text-center mb-6">
        <h1 class="font-luxury text-3xl font-bold text-yellow-700 tracking-tight">LIMITLESS ELITE</h1>
        <div class="inline-block bg-gray-100 text-[8px] font-bold px-4 py-1 rounded-full uppercase tracking-widest text-gray-400 mt-1">Tableau de Bord Stratégique</div>
    </div>

    <div class="card border-t-4 border-t-yellow-600">
        <h2 class="font-luxury text-sm font-bold mb-4 text-gray-800 uppercase flex justify-center items-center gap-2">
            <i class="fa-solid fa-calendar-check text-yellow-600"></i> Planning & Anticipation
        </h2>
        <div id="calendar" class="agenda-container">
            </div>
    </div>

    <div class="card bg-yellow-50/30 border-dashed border-2 border-yellow-200">
        <h2 class="font-luxury text-[10px] font-bold mb-3 text-yellow-800 uppercase flex items-center gap-2">
            <i class="fa-solid fa-circle-plus"></i> Planifier un Événement Perso
        </h2>
        <input id="evName" placeholder="Nom de l'événement">
        <select id="evType">
            <option value="Salon">Salon / Exposition</option>
            <option value="Réunion">Réunion d'équipe</option>
            <option value="Formation">Formation</option>
        </select>
        <input id="evDate" type="date">
        <button onclick="addEvent()" class="bg-black text-white w-full p-3 rounded-xl text-[10px] font-bold uppercase shadow-lg">Ajouter à l'agenda</button>
    </div>

    <div class="card shadow-lg">
        <h2 class="font-luxury text-md mb-4 text-gray-700 italic border-b pb-2 text-center">Nouvelle Vente</h2>
        <input id="cons" placeholder="Consultante">
        <input id="cli" placeholder="Cliente">
        <input id="prd" placeholder="Produit Chogan">
        <div class="flex gap-2">
            <input id="amt" type="number" placeholder="Montant" class="flex-1">
            <select id="cur" class="w-24">
                <option value="DA">DA</option>
                <option value="€">€</option>
            </select>
        </div>
        
        <span class="label-gold">SÉLECTIONNER UNE DATE D'ACHAT</span>
        <input id="vDate" type="date">
        
        <button onclick="saveSale()" class="gold-gradient text-white w-full p-4 rounded-2xl font-bold text-[11px] uppercase shadow-md mt-2">Enregistrer Transaction</button>
    </div>

    <div class="card bg-black text-white">
        <h2 class="text-yellow-500 font-luxury text-[10px] font-bold uppercase tracking-widest mb-4 italic text-center">Performance Équipe (CA Global)</h2>
        <div id="performance" class="space-y-3 text-[11px]"></div>
    </div>

    <div id="clients" class="mt-8"></div>
</div>

<script>
let sales = JSON.parse(localStorage.getItem("sales")) || [];
let events = JSON.parse(localStorage.getItem("events")) || [];

const holidays = [
    { n:"Aïd el-Fitr 🌙", d:"2026-03-20" },
    { n:"Aïd el-Adha", d:"2026-05-27" },
    { n:"Fête des Mères 🌸", d:"2026-05-31" },
    { n:"Saison Solaire ☀️", d:"2026-06-15" },
    { n:"Fête des Pères", d:"2026-06-21" },
    { n:"Black Friday 🔥", d:"2026-11-27" },
    { n:"Noël 🎄", d:"2026-12-25" }
];

function addEvent() {
    const n = document.getElementById("evName").value, t = document.getElementById("evType").value, d = document.getElementById("evDate").value;
    if(n && d) { events.push({ n, t, d }); localStorage.setItem("events", JSON.stringify(events)); refreshUI(); }
}

function saveSale() {
    const cons = document.getElementById("cons").value, cli = document.getElementById("cli").value, prd = document.getElementById("prd").value, amt = document.getElementById("amt").value, cur = document.getElementById("cur").value, dat = document.getElementById("vDate").value;
    if(cons && cli && dat) { sales.push({ id: Date.now(), cons, cli, prd, amt: parseFloat(amt)||0, cur, dat }); localStorage.setItem("sales", JSON.stringify(sales)); refreshUI(); }
}

function refreshUI() {
    const now = new Date(); now.setHours(0,0,0,0);
    let items = [], perf = {};

    // 1. Reconstitution complète de l'agenda
    holidays.forEach(h => {
        items.push({ n: h.n, d: h.d, t: "bg-fete", lbl: "Fête" });
        let pD = new Date(h.d); pD.setDate(pD.getDate() - 20);
        items.push({ n: `📦 PRÉPA STOCK : ${h.n}`, d: pD.toISOString().split('T')[0], t: "bg-prepa", lbl: "Rappel J-20" });
    });
    
    events.forEach(e => {
        items.push({ n: e.n, d: e.d, t: "bg-salon", lbl: e.t });
        let pE = new Date(e.d); pE.setDate(pE.getDate() - 20);
        items.push({ n: `📦 PRÉPA : ${e.n}`, d: pE.toISOString().split('T')[0], t: "bg-prepa", lbl: "Rappel J-20" });
    });

    sales.forEach(s => {
        let rDate = new Date(s.dat); rDate.setDate(rDate.getDate() + 40);
        items.push({ n: `RELANCE : ${s.cli}`, d: rDate.toISOString().split('T')[0], t: "bg-relance", lbl: "Relance" });
    });
    
    items.sort((a,b) => new Date(a.d) - new Date(b.d));
    
    let calH = "";
    items.forEach(i => {
        let dObj = new Date(i.d);
        let diff = Math.ceil((dObj - now) / 86400000);
        if(diff < -2) return;
        calH += `
        <div class="agenda-row ${diff < 0 ? 'past' : ''}">
            <div class="date-col">${dObj.toLocaleDateString('fr-FR')}</div>
            <div class="agenda-center">
                <span class="event-tag ${i.t}">${i.lbl}</span>
                <span class="font-semibold text-gray-700 uppercase text-[9px] tracking-tighter">${i.n}</span>
            </div>
            <div class="j-col">${diff < 0 ? 'OK' : 'J-' + diff}</div>
        </div>`;
    });
    document.getElementById("calendar").innerHTML = calH || "<div class='text-center py-8 text-gray-400 text-xs uppercase font-bold tracking-widest'>Aucun événement programmé</div>";

    // 2. Performance & Clients
    let cliH = "";
    sales.forEach(s => {
        if(!perf[s.cons]) perf[s.cons] = { da: 0, eu: 0 };
        if(s.cur === "DA") perf[s.cons].da += s.amt; else perf[s.cons].eu += s.amt;

        let diff = Math.floor((now - new Date(s.dat)) / 86400000);
        cliH += `<div class="card border-l-4 ${diff>=40?'border-red-500':'border-yellow-500'}">
            <div class="flex justify-between items-start mb-2 text-[8px] font-bold text-gray-400 uppercase">
                <span>${s.cons} • Depuis ${diff} j.</span>
                <button onclick="del(${s.id})"><i class="fa-solid fa-trash-can"></i></button>
            </div>
            <p class="font-luxury text-lg text-gray-800">${s.cli}</p>
            <p class="text-[10px] text-gray-500 mb-3">${s.prd} — ${s.amt} ${s.cur}</p>
            <button onclick="sendWA('${s.cli}','${s.prd}',${diff})" class="gold-gradient text-white w-full p-3 rounded-xl text-[10px] font-bold uppercase">Relancer Client</button>
        </div>`;
    });
    document.getElementById("clients").innerHTML = cliH;

    let perfH = "";
    for(let name in perf) {
        perfH += `<div class="flex justify-between border-b border-gray-800 pb-2">
            <span class="uppercase font-bold">${name}</span>
            <span class="text-yellow-500 font-bold">${perf[name].da} DA / ${perf[name].eu} €</span>
        </div>`;
    }
    document.getElementById("performance").innerHTML = perfH || "Données en attente...";
}

function sendWA(n,p,d) {
    const msg = `Bonjour ${n} ✨, c'est Marie 🌸. Ton ${p||'produit'} doit être fini après ${d} jours. On prévoit ton réassort ? 😍`;
    window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
}

function del(id) { if(confirm("Supprimer ?")) { sales = sales.filter(s => s.id !== id); localStorage.setItem("sales", JSON.stringify(sales)); refreshUI(); } }

refreshUI();
</script>
</body>
</html>
