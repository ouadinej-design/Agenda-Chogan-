<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limitless Elite - Manager Pro V4.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap');
        body { background:#fdfdfd; font-family: 'Montserrat', sans-serif; color: #333; padding-bottom: 40px; }
        .font-luxury { font-family: 'Playfair Display', serif; }
        .gold-gradient { background: linear-gradient(135deg, #D4AF37 0%, #B8860B 100%); }
        .card { background:white; border-radius:20px; padding:18px; margin-bottom:15px; border: 1px solid rgba(212,175,55,0.12); box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .agenda-container { max-height: 400px; overflow-y: auto; padding-right: 8px; scrollbar-width: thin; scrollbar-color: #D4AF37 #f8f8f8; }
        .event-tag { font-size: 7px; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; font-weight: bold; margin-right: 8px; color: white; }
        .bg-vente { background: #3b82f6; }
        .bg-relance { background: #f59e0b; }
        .bg-prepa { background: #7c3aed; }
        .bg-fete { background: #10b981; }
        .past { opacity: 0.35; filter: grayscale(1); }
        input, select { border-bottom: 1px solid #eee !important; border: none; outline: none; width: 100%; padding: 10px; font-size: 14px; margin-bottom: 10px; background: transparent; }
    </style>
</head>
<body class="p-4">

<div class="max-w-md mx-auto">
    <div class="text-center mb-8">
        <h1 class="font-luxury text-3xl font-bold text-yellow-700 tracking-tighter">LIMITLESS ELITE</h1>
        <div class="h-[1px] w-20 gold-gradient mx-auto my-2"></div>
        <p class="text-[9px] text-gray-400 uppercase tracking-[4px]">Tableau de Bord Stratégique</p>
    </div>

    <div class="card border-t-4 border-t-yellow-600">
        <h2 class="font-luxury text-sm font-bold mb-4 text-gray-800 uppercase flex items-center justify-between">
            <span><i class="fa-solid fa-calendar-day mr-2 text-yellow-600"></i> Agenda & Stocks</span>
        </h2>
        <div id="calendar" class="agenda-container space-y-3 text-[10px]"></div>
    </div>

    <div class="card">
        <h2 class="font-luxury text-sm mb-4 text-gray-700 italic border-b pb-2">Enregistrer une Vente</h2>
        <input id="cli" placeholder="Nom de la cliente">
        <input id="prd" placeholder="Produit Chogan">
        <div class="flex flex-col">
            <label class="text-[9px] font-bold text-gray-400 ml-2">DATE D'ACHAT</label>
            <input id="dat" type="date">
        </div>
        <button onclick="saveSale()" class="gold-gradient text-white w-full p-4 rounded-2xl font-bold text-[11px] uppercase tracking-widest shadow-lg active:scale-95 transition">
            Valider la Transaction
        </button>
    </div>

    <div class="my-6">
        <h2 class="font-luxury text-sm font-bold text-yellow-800 uppercase italic px-2 mb-4">Relances à effectuer</h2>
        <div id="clients"></div>
    </div>
</div>

<script>
// Base de données locale
let sales = JSON.parse(localStorage.getItem("sales")) || [];

const holidays = [
    { n:"Saint-Valentin ❤️", d:"2026-02-14" },
    { n:"Aïd el-Fitr 🌙", d:"2026-03-20" },
    { n:"Fête des Mères 🌸", d:"2026-05-31" },
    { n:"Fête des Pères", d:"2026-06-21" },
    { n:"Black Friday 🔥", d:"2026-11-27" },
    { n:"Noël 🎄", d:"2026-12-25" }
];

function saveSale() {
    const cli = document.getElementById("cli").value;
    const prd = document.getElementById("prd").value;
    const dat = document.getElementById("dat").value;
    if(!cli || !dat) return alert("Veuillez remplir le nom et la date.");
    
    sales.push({ id: Date.now(), n: cli, p: prd, d: dat });
    localStorage.setItem("sales", JSON.stringify(sales));
    
    // Reset champs
    document.getElementById("cli").value = "";
    document.getElementById("prd").value = "";
    document.getElementById("dat").value = "";
    
    refreshUI();
}

function refreshUI() {
    const now = new Date();
    now.setHours(0,0,0,0);
    let items = [];

    // 1. Génération Événements & Stocks J-20
    holidays.forEach(h => {
        items.push({ n: h.n, d: h.d, t: "bg-fete", lbl: "FÊTE" });
        let pD = new Date(h.d);
        pD.setDate(pD.getDate() - 20);
        items.push({ n: `PRÉPA STOCK : ${h.n}`, d: pD.toISOString().split('T')[0], t: "bg-prepa", lbl: "STOCK J-20" });
    });

    // 2. Génération Ventes & Relances J+40
    sales.forEach(s => {
        items.push({ n: `Vente : ${s.n}`, d: s.d, t: "bg-vente", lbl: "VENTE" });
        let rD = new Date(s.d);
        rD.setDate(rD.getDate() + 40);
        items.push({ n: `Relance : ${s.n}`, d: rD.toISOString().split('T')[0], t: "bg-relance", lbl: "RELANCE" });
    });

    // Tri chronologique
    items.sort((a,b) => new Date(a.d) - new Date(b.d));

    // Affichage Agenda
    let calHTML = "";
    items.forEach(i => {
        const itemDate = new Date(i.d);
        const diff = Math.ceil((itemDate - now) / 86400000);
        if (diff < -30) return; // Ne pas afficher les vieux trucs de plus d'un mois

        calHTML += `
        <div class="flex justify-between items-center py-2 border-b border-gray-50 ${diff < 0 ? 'past' : ''}">
            <div class="flex items-center">
                <span class="event-tag ${i.t}">${i.lbl}</span>
                <span class="font-semibold text-gray-700">${i.n}</span>
            </div>
            <span class="font-bold text-gray-400 text-[8px]">${diff < 0 ? '✓' : 'J-' + diff}</span>
        </div>`;
    });
    document.getElementById("calendar").innerHTML = calHTML || "Aucun événement à venir.";

    // Affichage Relances Clients
    let cliHTML = "";
    sales.forEach(s => {
        const diff = Math.floor((now - new Date(s.d)) / 86400000);
        // On affiche les clients à relancer à partir de J+35
        if (diff >= 35) {
            cliHTML += `
            <div class="card border-l-4 ${diff >= 40 ? 'border-red-500' : 'border-orange-400'}">
                <div class="flex justify-between items-start mb-2">
                    <p class="text-[9px] font-bold text-gray-400 uppercase">${diff} JOURS ÉCOULÉS</p>
                    <button onclick="deleteSale(${s.id})" class="text-gray-300 hover:text-red-500"><i class="fa-solid fa-trash-can"></i></button>
                </div>
                <p class="font-luxury text-lg text-gray-800">${s.n}</p>
                <p class="text-[10px] text-gray-500 mb-3">${s.p || 'Produit Chogan'}</p>
                <button onclick="sendWA('${s.n}', '${s.p}', ${diff})" class="gold-gradient text-white w-full p-3 rounded-xl text-[10px] font-bold uppercase shadow-sm">
                    <i class="fa-brands fa-whatsapp mr-2"></i> Relancer Client
                </button>
            </div>`;
        }
    });
    document.getElementById("clients").innerHTML = cliHTML || "<p class='text-center text-xs text-gray-400 italic'>Aucune relance urgente.</p>";
}

function sendWA(name, prod, days) {
    const msgs = [
        `Bonjour ${name} ✨, c'est Marie 🌸. J'espère que tu vas bien ! Je reviens vers toi car ton ${prod || 'produit'} doit toucher à sa fin après ${days} jours. Un réassort ? 😍`,
        `Coucou ${name} 🌟, c'est Marie. Déjà ${days} jours pour ton ${prod || 'parfum'}, le temps passe vite ! Je prépare une commande, tu veux que je te reprenne quelque chose ? 🎀`
    ];
    const chosen = msgs[Math.floor(Math.random() * msgs.length)];
    window.open(`https://wa.me/?text=${encodeURIComponent(chosen)}`, '_blank');
}

function deleteSale(id) {
    if(confirm("Supprimer cette vente ?")) {
        sales = sales.filter(s => s.id !== id);
        localStorage.setItem("sales", JSON.stringify(sales));
        refreshUI();
    }
}

// Lancement au démarrage
refreshUI();
</script>
</body>
</html>
