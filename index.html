<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limitless Elite - Manager Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
            color: #1a1a1a;
        }

        .gold-gradient {
            background: linear-gradient(135deg, #D4AF37 0%, #F9E29C 50%, #B8860B 100%);
        }

        .gold-text {
            background: linear-gradient(135deg, #B8860B 0%, #D4AF37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card-luxury {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .nav-item.active {
            color: #B8860B;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/javascript">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('agenda');
            const [sales, setSales] = useState([
                { id: 1, date: '2026-05-01', consultant: 'Marie', client: 'Sarah B.', product: 'Parfum Luxury', amount: 5500 },
                { id: 2, date: '2026-05-02', consultant: 'Marie', client: 'Ahmed K.', product: 'Soin Visage', amount: 4535 }
            ]);

            // Composant de l'Agenda Stratégique
            const AgendaView = () => (
                <div className="p-4 space-y-6">
                    <div className="card-luxury p-6">
                        <h2 className="text-xl font-bold mb-4 gold-text">Anticipation Stratégique</h2>
                        <div className="space-y-4">
                            <div className="flex items-center justify-between p-3 bg-yellow-50 rounded-xl border-l-4 border-yellow-500">
                                <div>
                                    <p className="font-bold">Pré-commandes (Rappel J-20)</p>
                                    <p className="text-sm text-gray-600">Préparer les stocks pour l'Aïd</p>
                                </div>
                                <i className="fas fa-clock text-yellow-600"></i>
                            </div>
                            <div className="flex items-center justify-between p-3 bg-blue-50 rounded-xl border-l-4 border-blue-500">
                                <div>
                                    <p className="font-bold">Fête des Mères</p>
                                    <p className="text-sm text-gray-600">Lancement des coffrets cadeaux</p>
                                </div>
                                <i className="fas fa-gift text-blue-600"></i>
                            </div>
                        </div>
                    </div>
                </div>
            );

            // Composant des Statistiques (Mode Sombre Luxury)
            const StatsView = () => {
                const totalCA = sales.reduce((acc, sale) => acc + sale.amount, 0);
                return (
                    <div className="p-4 space-y-6 bg-slate-900 min-h-screen">
                        <div className="grid grid-cols-2 gap-4">
                            <div className="bg-slate-800 p-4 rounded-2xl border border-yellow-600/30">
                                <p className="text-gray-400 text-xs">CA MENSUEL</p>
                                <p className="text-xl font-bold text-white">{totalCA.toLocaleString()} DA</p>
                            </div>
                            <div className="bg-slate-800 p-4 rounded-2xl border border-yellow-600/30">
                                <p className="text-gray-400 text-xs">VENTES</p>
                                <p className="text-xl font-bold text-white">{sales.length}</p>
                            </div>
                        </div>
                        <div className="bg-slate-800 p-6 rounded-2xl">
                            <h3 className="text-white font-bold mb-4">Top Clients</h3>
                            {sales.map(sale => (
                                <div key={sale.id} className="flex justify-between py-2 border-b border-slate-700 text-sm">
                                    <span className="text-gray-300">{sale.client}</span>
                                    <span className="text-yellow-500 font-bold">{sale.amount} DA</span>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            // Rendu principal
            return (
                <div className="max-w-md mx-auto bg-gray-50 min-h-screen pb-24">
                    <header className="gold-gradient p-6 rounded-b-[3rem] text-center shadow-lg">
                        <h1 className="text-white text-2xl font-bold tracking-wider">LIMITLESS ELITE</h1>
                        <p className="text-white/80 text-sm italic">Manager Pro Edition</p>
                    </header>

                    {view === 'agenda' && <AgendaView />}
                    {view === 'stats' && <StatsView />}
                    {view === 'vente' && (
                        <div className="p-4">
                            <div className="card-luxury p-6">
                                <h2 className="text-xl font-bold mb-4 gold-text">Nouvelle Vente</h2>
                                <input type="text" placeholder="Nom du Client" className="w-full mb-3 p-3 border rounded-xl" />
                                <input type="number" placeholder="Montant (DA)" className="w-full mb-4 p-3 border rounded-xl" />
                                <button className="w-full gold-gradient text-white font-bold py-3 rounded-xl uppercase tracking-widest shadow-md">
                                    Enregistrer
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Navigation Bar */}
                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-gray-200 px-6 py-3 flex justify-between items-center shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
                        <button onClick={() => setView('agenda')} className={`nav-item flex flex-col items-center ${view === 'agenda' ? 'active' : 'text-gray-400'}`}>
                            <i className="fas fa-calendar-alt text-xl"></i>
                            <span className="text-[10px] mt-1 font-semibold">Agenda</span>
                        </button>
                        <button onClick={() => setView('vente')} className={`nav-item flex flex-col items-center ${view === 'vente' ? 'active' : 'text-gray-400'}`}>
                            <i className="fas fa-plus-circle text-xl"></i>
                            <span className="text-[10px] mt-1 font-semibold">Vente</span>
                        </button>
                        <button onClick={() => setView('stats')} className={`nav-item flex flex-col items-center ${view === 'stats' ? 'active' : 'text-gray-400'}`}>
                            <i className="fas fa-chart-line text-xl"></i>
                            <span className="text-[10px] mt-1 font-semibold">Stats</span>
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
