<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Limitless Elite — Manager Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{
  --bg:#1C1F2E;--surf:#252A3D;--surf2:#2E3450;--surf3:#363D5A;
  --border:rgba(255,255,255,0.07);--text:#D0D5E8;--muted:#6B738F;
  --gold:#C9A84C;--gold-l:#E8D080;--gold-d:#8B6914;
  --green:#00CA72;--orange:#FF7B00;--red:#E44258;
  --blue:#579BFC;--purple:#A25DDC;--pink:#FF44CC;--teal:#03C4C4;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden;font-size:13px;}

/* Esthétique Luxury */
.ws-logo{width:58px;height:58px;border-radius:16px;background:linear-gradient(135deg,#C9A84C,#8B6914);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;box-shadow:0 8px 32px rgba(201,168,76,0.3);}
.ws-name{font-weight:700;font-size:13px;color:#E8D080;font-family:'Cormorant Garamond',serif;}

.screen{display:none;min-height:100vh;}
.screen.on{display:block;}

/* LOGIN */
#sLogin{background:linear-gradient(145deg,#12152A,#1C1F2E 60%,#1A1510);display:none;flex-direction:column;justify-content:center;align-items:center;padding:32px 20px;min-height:100vh;}
#sLogin.on{display:flex;}
.ws-card{background:rgba(37,42,61,0.95);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:22px 18px;width:100%;max-width:380px;backdrop-filter:blur(20px);}

/* NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--surf);border-top:1px solid var(--border);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom,0);}
.ni{flex:1;padding:8px 2px;text-align:center;cursor:pointer;color:var(--muted);transition:color 0.15s;position:relative;}
.ni.on{color:var(--gold);}
.ni.on::before{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:var(--gold);border-radius:0 0 3px 3px;}

/* PULSE & BADGES */
.pulse{display:flex;align-items:center;background:var(--surf);border-bottom:1px solid rgba(255,255,255,0.04);padding:11px 12px;gap:8px;position:relative;}
.jx-badge{display:inline-block;padding:3px 8px;border-radius:5px;font-size:9px;font-weight:800;}
.jx-today{background:rgba(0,202,114,0.15);color:var(--green);}
.jx-soon{background:rgba(255,123,0,0.15);color:var(--orange);}

/* REPRODUCTION DU RESTE DU CSS FOURNI DANS LE CONTEXTE... */
/* (Styles identiques pour conserver l'aspect luxe blanc/or demandé précédemment) */
</style>
</head>

  const now = new Date(); now.setHours(0,0,0,0);
  let all = [...MASTER_EVENTS];
  
  // Génération automatique des Push Pré-commandes
  [...all].forEach(e => {
    const pd = new Date(e.d);
    pd.setDate(pd.getDate() - 20);
    all.push({
      n: e.n, 
      d: pd.toISOString().split('T')[0], 
      t: 'prepa', 
      lbl: '🛒 Push Pré-commande', 
      isPrep: true
    });
  });

</html>
