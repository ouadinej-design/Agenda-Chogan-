<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limitless Elite - Manager Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #ffffff; }
        .gold-gradient { background: linear-gradient(135deg, #D4AF37 0%, #B8860B 100%); }
        .gold-text { color: #B8860B; }
        .card-luxury { 
            background: white; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            border: 1px solid rgba(212, 175, 55, 0.1);
        }
        .nav-active { color: #B8860B !important; border-top: 3px solid #B8860B; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [view, setView] = useState('agenda');

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white pb-20">
                    {/* Header Luxe */}
                    <header className="gold-gradient p-8 rounded-b-[40px] text-center shadow-lg">
                        <h1 className="text-white text-2xl font-bold tracking-tighter">LIMITLESS ELITE</h1>
                        <p className="text-white/90 text-xs uppercase tracking-widest mt-1">Édition Manager Pro</p>
                    </header>

                    {/* Contenu Dynamique */}
                    <main className="p-4">
                        {view === 'agenda' && (
                            <div className="space-y-4">
                                <h2 className="text-lg font-bold flex items-center gap-2">
                                    <i className="fas fa-calendar-check gold-text"></i> Calendrier Stratégique
                                </h2>
                                <div className="card-luxury p-5 border-l-4 border-l-[#B8860B]">
                                    <p className="text-xs text-gray-400">RAPPEL J-20</p>
                                    <p className="font-bold">Pré-commandes : Fête des Mères</p>
                                </div>
                                <div className="card-luxury p-5 border-l-4 border-l-blue-400">
                                    <p className="text-xs text-gray-400">BUSINESS</p>
                                    <p className="font-bold">Fête des Mères (FR)</p>
                                </div>
                            </div>
                        )}

                        {view === 'stats' && (
                            <div className="space-y-4">
                                <h2 className="text-lg font-bold gold-text">Statistiques</h2>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="card-luxury p-4 text-center">
                                        <p className="text-2xl font-bold">10 035</p>
                                        <p className="text-[10px] text-gray-500 uppercase">CA Total (DA)</p>
                                    </div>
                                    <div className="card-luxury p-4 text-center">
                                        <p className="text-2xl font-bold">2</p>
                                        <p className="text-[10px] text-gray-500 uppercase">Ventes</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'vente' && (
                            <div className="card-luxury p-6 mt-4">
                                <h2 className="text-lg font-bold mb-4 gold-text underline">Nouvelle Vente</h2>
                                <div className="space-y-3">
                                    <input type="text" placeholder="Client" className="w-full p-3 border rounded-xl bg-gray-50 outline-none focus:border-[#D4AF37]" />
                                    <input type="number" placeholder="Montant DA" className="w-full p-3 border rounded-xl bg-gray-50 outline-none focus:border-[#D4AF37]" />
                                    <button className="w-full gold-gradient text-white font-bold py-3 rounded-xl mt-2 shadow-md hover:opacity-90 transition">
                                        ENREGISTRER
                                    </button>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Navigation Basse */}
                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/90 backdrop-blur-md border-t flex justify-around py-3">
                        <button onClick={() => setView('agenda')} className={`flex flex-col items-center gap-1 ${view === 'agenda' ? 'nav-active' : 'text-gray-400'}`}>
                            <i className="fas fa-home text-xl"></i>
                            <span className="text-[10px] font-bold">Agenda</span>
                        </button>
                        <button onClick={() => setView('vente')} className={`flex flex-col items-center gap-1 ${view === 'vente' ? 'nav-active' : 'text-gray-400'}`}>
                            <i className="fas fa-plus-circle text-xl"></i>
                            <span className="text-[10px] font-bold">Vente</span>
                        </button>
                        <button onClick={() => setView('stats')} className={`flex flex-col items-center gap-1 ${view === 'stats' ? 'nav-active' : 'text-gray-400'}`}>
                            <i className="fas fa-chart-bar text-xl"></i>
                            <span className="text-[10px] font-bold">Stats</span>
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
