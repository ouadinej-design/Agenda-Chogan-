<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Limitless Elite — Agenda Expert</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{
  --bg:#FDFDFD;--surf:#FFFFFF;--surf2:#F8F9FA;
  --border:rgba(201,168,76,0.15);--text:#2D3436;--muted:#636E72;
  --gold:#C9A84C;--gold-l:#D4AF37;--gold-d:#8B6914;
  --green:#27AE60;--orange:#E67E22;--blue:#0984E3;--pink:#E84393;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;font-size:13px;}

.screen{display:none;}
.screen.on{display:block;}

/* TOPBAR & NAV */
.topbar{background:var(--surf);border-bottom:1px solid var(--border);padding:0 16px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo-area{display:flex;align-items:center;gap:10px;}
.logo-badge{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#C9A84C,#8B6914);display:flex;align-items:center;justify-content:center;color:#FFF;font-weight:800;}
.logo-text{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:16px;color:var(--gold-d);line-height:1;}

/* AGENDA STYLES */
.page-hdr{padding:20px 16px 10px;display:flex;align-items:center;justify-content:space-between;}
.page-hdr h2{font-size:20px;font-family:'Cormorant Garamond',serif;font-weight:700;}

.filter-bar{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;}
.chip{padding:6px 14px;border-radius:20px;font-size:10px;font-weight:700;cursor:pointer;background:var(--surf);border:1px solid var(--border);white-space:nowrap;color:var(--muted);transition:0.2s;}
.chip.on{background:rgba(201,168,76,0.1);border-color:var(--gold);color:var(--gold-d);}

/* ADD EVENT FORM[cite: 2] */
.add-panel{background:var(--surf);border:1px solid var(--border);border-radius:12px;margin:0 16px 20px;padding:16px;box-shadow:0 4px 15px rgba(0,0,0,0.03);}
.inp-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.inp{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);font-family:'Inter',sans-serif;font-size:12px;outline:none;background:var(--surf2);}
.inp:focus{border-color:var(--gold);}
.btn-gold{background:linear-gradient(135deg,#C9A84C,#A07A28);color:#FFF;border:none;padding:12px;border-radius:8px;font-weight:700;width:100%;cursor:pointer;box-shadow:0 4px 10px rgba(201,168,76,0.2);}

/* LISTING */
.board{padding:0 16px 80px;}
.event-card{background:var(--surf);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.02);}
.event-color{position:absolute;left:0;top:0;bottom:0;width:4px;}
.event-info{flex:1;}
.event-name{font-weight:700;font-size:13px;margin-bottom:2px;}
.event-meta{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;}
.jx-badge{padding:4px 8px;border-radius:6px;font-size:10px;font-weight:800;background:var(--surf2);color:var(--gold-d);}

.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--surf);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom,0);z-index:1000;}
.ni{flex:1;padding:15px;text-align:center;color:var(--muted);cursor:pointer;}
.ni.on{color:var(--gold-d);}

#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--text);color:#FFF;padding:10px 20px;border-radius:30px;font-size:12px;z-index:2000;display:none;}
</style>
</head>
<body>
<div id="toast"></div>

<div id="sApp" class="screen on">
  <div class="topbar">
    <div class="logo-area">
      <div class="logo-badge">L</div>
      <div>
        <div class="logo-text">LIMITLESS ELITE</div>
        <div style="font-size:8px;color:var(--muted);letter-spacing:1px;">STRATEGY MANAGER</div>
      </div>
    </div>
    <div style="font-size:10px;font-weight:700;color:var(--gold-d);" id="curDate"></div>
  </div>

  <div class="page-hdr">
    <h2>Agenda Stratégique</h2>
    <button onclick="toggleAdd()" style="background:none;border:none;color:var(--gold-d);font-size:18px;"><i class="fa-solid fa-circle-plus"></i></button>
  </div>

  <!-- FORMULAIRE D'AJOUT[cite: 2] -->
  <div id="addForm" class="add-panel" style="display:none;">
    <input id="evName" class="inp" style="margin-bottom:10px;" placeholder="Nom de l'événement (ex: Promo Flash)">
    <div class="inp-row">
        <input id="evDate" class="inp" type="date">
        <select id="evCat" class="inp">
            <option value="comm">Business</option>
            <option value="mus">Islam</option>
            <option value="cath">Catho</option>
            <option value="perso">Personnel</option>
        </select>
    </div>
    <button class="btn-gold" onclick="saveCustomEvent()">Ajouter à l'agenda</button>
  </div>

  <div class="filter-bar">
    <div class="chip on" onclick="setFilter('all',this)">Tout</div>
    <div class="chip" onclick="setFilter('prepa',this)">📦 Pré-commandes</div>
    <div class="chip" onclick="setFilter('mus',this)">Islam</div>
    <div class="chip" onclick="setFilter('comm',this)">Business</div>
    <div class="chip" onclick="setFilter('cath',this)">Catho</div>
  </div>

  <div class="board" id="agendaList"></div>

  <nav class="bnav">
    <div class="ni on"><i class="fa-solid fa-calendar-gold"></i><div style="font-size:8px;margin-top:4px;">AGENDA</div></div>
    <div class="ni" onclick="toast('Module Ventes bientôt disponible')"><i class="fa-solid fa-bag-shopping"></i><div style="font-size:8px;margin-top:4px;">VENTES</div></div>
    <div class="ni" onclick="toast('Module Team bientôt disponible')"><i class="fa-solid fa-users"></i><div style="font-size:8px;margin-top:4px;">TEAM</div></div>
  </nav>
</div>

<script>
// Événements 2026 complets[cite: 2]
const MASTER_EVENTS = [
    {n:"Saint-Valentin ❤️", d:"2026-02-14", t:"comm", lbl:"Business"},
    {n:"Ramadan 🌙", d:"2026-02-18", t:"mus", lbl:"Islam"},
    {n:"Aïd el-Fitr", d:"2026-03-20", t:"mus", lbl:"Islam"},
    {n:"Pâques 🐣", d:"2026-04-05", t:"cath", lbl:"Catho"},
    {n:"Aïd el-Adha 🐏", d:"2026-05-27", t:"mus", lbl:"Islam"},
    {n:"Fête des Mères 🌹", d:"2026-05-31", t:"comm", lbl:"Business"},
    {n:"Fête des Pères 👔", d:"2026-06-21", t:"comm", lbl:"Business"},
    {n:"Soldes d'Été 🏷️", d:"2026-06-24", t:"comm", lbl:"Business"},
    {n:"Achoura 🕌", d:"2026-07-25", t:"mus", lbl:"Islam"},
    {n:"Mawlid 🕯️", d:"2026-08-25", t:"mus", lbl:"Islam"},
    {n:"Rentrée Scolaire", d:"2026-09-01", t:"comm", lbl:"Business"},
    {n:"Black Friday 🔥", d:"2026-11-27", t:"comm", lbl:"Business"},
    {n:"Noël 🎄", d:"2026-12-25", t:"cath", lbl:"Catho"}
];

let currentFilter = 'all';

function getCustomEvents() {
    return JSON.parse(localStorage.getItem('le_custom_events') || '[]');
}

function saveCustomEvent() {
    const name = document.getElementById('evName').value;
    const date = document.getElementById('evDate').value;
    const cat = document.getElementById('evCat').value;
    
    if(!name || !date) return toast("Remplis tous les champs");
    
    const customs = getCustomEvents();
    customs.push({n: name, d: date, t: cat, lbl: document.getElementById('evCat').options[document.getElementById('evCat').selectedIndex].text});
    localStorage.setItem('le_custom_events', JSON.stringify(customs));
    
    document.getElementById('evName').value = "";
    toggleAdd();
    renderAgenda();
    toast("Événement ajouté !");
}

function toggleAdd() {
    const f = document.getElementById('addForm');
    f.style.display = f.style.display === 'none' ? 'block' : 'none';
}

function setFilter(f, el) {
    currentFilter = f;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
    el.classList.add('on');
    renderAgenda();
}

function renderAgenda() {
    const now = new Date(); now.setHours(0,0,0,0);
    const customs = getCustomEvents();
    let all = [...MASTER_EVENTS, ...customs];
    
    // Génération automatique des pré-commandes J-20[cite: 2]
    let finalEvents = [];
    all.forEach(e => {
        finalEvents.push(e);
        let pd = new Date(e.d);
        pd.setDate(pd.getDate() - 20);
        finalEvents.push({n: e.n, d: pd.toISOString().split('T')[0], t: 'prepa', lbl: '📦 Pré-commande'});
    });

    if(currentFilter !== 'all') {
        finalEvents = finalEvents.filter(x => x.t === currentFilter);
    }

    const listing = finalEvents
        .filter(x => new Date(x.d) >= now)
        .sort((a,b) => new Date(a.d) - new Date(b.d));

    const html = listing.map(ev => {
        const diff = Math.ceil((new Date(ev.d) - now) / 86400000);
        const color = ev.t === 'prepa' ? 'var(--gold)' : (ev.t === 'mus' ? 'var(--green)' : 'var(--gold-d)');
        
        return `
            <div class="event-card">
                <div class="event-color" style="background:${color}"></div>
                <div class="event-info">
                    <div class="event-name">${ev.n}</div>
                    <div class="event-meta">${ev.lbl} • ${new Date(ev.d).toLocaleDateString('fr-FR')}</div>
                </div>
                <div class="jx-badge">${diff === 0 ? 'AUJOURD\'HUI' : 'J-' + diff}</div>
            </div>
        `;
    }).join('');

    document.getElementById('agendaList').innerHTML = html || '<p style="text-align:center;color:var(--muted);margin-top:40px;">Aucun événement à venir</p>';
}

function toast(m) {
    const t = document.getElementById('toast');
    t.textContent = m; t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2500);
}

document.getElementById('curDate').textContent = new Date().toLocaleDateString('fr-FR', {day:'numeric', month:'short'});
renderAgenda();
</script>
</body>
</html>
