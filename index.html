<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Limitless Elite — Manager Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
/* ══════════════════════════════════════
   TOKENS — Dark luxury workspace
══════════════════════════════════════ */
:root{
  --bg:       #1C1F2E;
  --surface:  #252A3D;
  --surface2: #2E3450;
  --surface3: #363D5A;
  --border:   rgba(255,255,255,0.07);
  --text:     #D0D5E8;
  --muted:    #6B738F;
  --gold:     #C9A84C;
  --gold-l:   #E8D080;
  --gold-d:   #8B6914;
  --green:    #00CA72;
  --orange:   #FF7B00;
  --red:      #E44258;
  --blue:     #579BFC;
  --purple:   #A25DDC;
  --pink:     #FF44CC;
  --teal:     #03C4C4;
  --prepa:    #A25DDC;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden;font-size:13px;}
.lux{font-family:'Cormorant Garamond',serif;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px;}

/* ── SCREENS ── */
.screen{display:none;min-height:100vh;}
.screen.on{display:block;}

/* ══════════════════════════════════════
   LOGIN
══════════════════════════════════════ */
#sLogin{
  background:linear-gradient(145deg,#12152A 0%,#1C1F2E 60%,#1A1510 100%);
  display:none;flex-direction:column;justify-content:center;align-items:center;
  padding:32px 20px;min-height:100vh;
}
#sLogin.on{display:flex;}
.ws-logo{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,#C9A84C,#8B6914);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 8px 32px rgba(201,168,76,0.3);}
.ws-card{background:rgba(37,42,61,0.9);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:24px 20px;width:100%;max-width:380px;backdrop-filter:blur(20px);}
.ws-btn{background:var(--surface2);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:13px 14px;width:100%;text-align:left;cursor:pointer;transition:all 0.2s;margin-bottom:8px;display:flex;align-items:center;gap:12px;color:var(--text);font-family:'Inter',sans-serif;}
.ws-btn:hover{background:var(--surface3);border-color:rgba(201,168,76,0.3);transform:translateX(2px);}
.ws-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.form-panel{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-top:12px;}

/* ── INPUTS ── */
.inp{background:var(--surface3);border:1.5px solid rgba(255,255,255,0.08);border-radius:8px;color:var(--text);padding:10px 12px;width:100%;font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border-color 0.15s;margin-bottom:8px;}
.inp:focus{border-color:var(--gold);background:rgba(201,168,76,0.04);}
.inp::placeholder{color:var(--muted);}
.lbl{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:0.5px;display:block;margin-bottom:5px;}

/* ── BUTTONS ── */
.btn-primary{background:linear-gradient(135deg,#C9A84C,#A07A28);color:#0D0F1A;font-weight:700;font-size:12px;letter-spacing:0.3px;border-radius:8px;padding:12px 20px;width:100%;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:all 0.2s;}
.btn-ghost{background:transparent;border:1.5px solid rgba(255,255,255,0.1);color:var(--muted);font-weight:500;font-size:11px;border-radius:8px;padding:10px 16px;cursor:pointer;font-family:'Inter',sans-serif;width:100%;margin-top:6px;}

/* ══════════════════════════════════════
   APP LAYOUT
══════════════════════════════════════ */
#sApp{background:var(--bg);padding-bottom:68px;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:52px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.topbar-left{display:flex;align-items:center;gap:10px;}
.workspace-icon{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#C9A84C,#8B6914);display:flex;align-items:center;justify-content:center;font-size:13px;color:#0D0F1A;font-weight:800;flex-shrink:0;}
.workspace-name{font-weight:700;font-size:14px;color:#E8D8A0;font-family:'Cormorant Garamond',serif;letter-spacing:0.5px;}
.workspace-role{font-size:9px;color:var(--muted);font-weight:500;margin-top:1px;}
.icon-btn{width:32px;height:32px;border-radius:8px;background:transparent;border:1px solid var(--border);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all 0.2s;}
.admin-chip{background:linear-gradient(135deg,#C9A84C,#8B6914);color:#0D0F1A;font-size:8px;font-weight:800;letter-spacing:0.5px;padding:3px 8px;border-radius:20px;text-transform:uppercase;}

.page-title{padding:16px 16px 0;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.page-title h2{font-size:18px;font-weight:700;color:#fff;letter-spacing:-0.3px;}

.search-wrap{padding:0 16px 10px;position:relative;}
.search-inp{background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);padding:9px 12px 9px 34px;width:100%;font-size:12px;font-family:'Inter',sans-serif;outline:none;transition:border-color 0.15s;}
.search-icon{position:absolute;left:28px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:12px;pointer-events:none;}
