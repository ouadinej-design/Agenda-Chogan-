<!DOCTYPE html>
<html lang="fr">
<head>

<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
<style>
body{font-family:'Poppins',sans-serif;background:#fdfdfd;color:#1a1a1a;margin:0;padding-bottom:100px;}
.gold-gradient{background:linear-gradient(135deg,#D4AF37 0%,#F9E29C 50%,#B8860B 100%);}
.gold-text{color:#B8860B;}
.card-luxe{background:white;border-radius:2rem;box-shadow:0 10px 40px rgba(212,175,55,0.08);border:1px solid rgba(212,175,55,0.08);padding:1.2rem;margin-bottom:1rem;}
.input-prestige{width:100%;padding:1rem;background:#fafafa;border-radius:1rem;border:1px solid #f0f0f0;outline:none;font-size:0.85rem;font-family:'Poppins',sans-serif;transition:0.3s;box-sizing:border-box;}
.input-prestige:focus{border-color:#D4AF37;box-shadow:0 0 10px rgba(212,175,55,0.1);}
.nav-active{color:#B8860B !important;}
.pill{display:inline-block;padding:2px 10px;border-radius:20px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;}
.pill-mus{background:#f0fdf4;color:#16a34a;}
.pill-cath{background:#eff6ff;color:#2563eb;}
.pill-comm{background:#fff7ed;color:#c2410c;}
.pill-saison{background:#fdf4ff;color:#9333ea;}
.pill-prepa{background:#fef3c7;color:#b45309;}
.pill-perso{background:#f0fdfa;color:#0891b2;}
.jx{font-size:10px;font-weight:700;}
.jx-today{color:#16a34a;}
.jx-soon{color:#d97706;}
.jx-future{color:#B8860B;}
.jx-past{color:#9ca3af;}
.past-row{opacity:0.25;filter:grayscale(0.9);}
.group-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#9ca3af;padding:8px 4px 4px;}
.stat-card{background:linear-gradient(135deg,#1a1a1a,#2d2d2d);border-radius:2rem;padding:1.5rem;text-align:center;color:white;margin-bottom:1rem;}
.btn-gold{background:linear-gradient(135deg,#D4AF37,#B8860B);color:white;font-weight:700;padding:1rem;border-radius:1.2rem;width:100%;border:none;cursor:pointer;font-family:'Poppins',sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:1px;}
.btn-ghost{background:transparent;border:1px solid #e5e7eb;color:#9ca3af;font-size:11px;padding:0.8rem;border-radius:1rem;width:100%;cursor:pointer;font-family:'Poppins',sans-serif;margin-top:8px;}
.section-title{font-size:18px;font-weight:700;color:#B8860B;font-style:italic;margin-bottom:16px;}
.bar-track{background:#f3f4f6;border-radius:4px;height:5px;overflow:hidden;margin-top:4px;}
.bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#D4AF37,#B8860B);}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;flex-shrink:0;}
.client-row{background:white;border-radius:1.2rem;border:1px solid #f0f0f0;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.03);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:flex-end;backdrop-filter:blur(4px);}
.modal-sheet{background:white;border-radius:2rem 2rem 0 0;padding:20px;width:100%;max-height:85vh;overflow-y:auto;}
.chip-bar{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;}
.chip-bar::-webkit-scrollbar{height:0;}
.chip{padding:4px 12px;border-radius:20px;font-size:9px;font-weight:600;cursor:pointer;border:1.5px solid #e5e7eb;background:white;color:#9ca3af;font-family:'Poppins',sans-serif;white-space:nowrap;}
.chip-on{background:#fef3c7;border-color:#D4AF37;color:#B8860B;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const ADMIN_EMAIL="ouadi.nej@gmail.com",ADMIN_PASS="1981";
const TYPE_COLOR={mus:'#16a34a',cath:'#2563eb',comm:'#c2410c',saison:'#9333ea',prepa:'#b45309',perso:'#0891b2'};

  {n:"Ascension",d:"2026-05-14",t:"cath",lbl:"Catho"},
  {n:"Pentecôte",d:"2026-05-24",t:"cath",lbl:"Catho"},
  {n:"Aïd el-Adha 🐑",d:"2026-05-27",t:"mus",lbl:"Islam"},
  {n:"Fête des Mères 🌹",d:"2026-05-31",t:"comm",lbl:"Business"},
  {n:"Fête des Pères 👔",d:"2026-06-21",t:"comm",lbl:"Business"},
  {n:"Soldes d'Été (début)",d:"2026-06-24",t:"comm",lbl:"Business"},
  {n:"Soldes d'Été (fin)",d:"2026-07-21",t:"comm",lbl:"Business"},

  {n:"Mawlid",d:"2026-09-15",t:"mus",lbl:"Islam"},

  {n:"Fêtes Fin d'Année ✨",d:"2026-12-01",t:"saison",lbl:"Saison"},
  {n:"Noël Commercial 🎁",d:"2026-12-20",t:"comm",lbl:"Business"},
  {n:"Noël 🎄",d:"2026-12-25",t:"cath",lbl:"Catho"},
];

const getSales=()=>JSON.parse(localStorage.getItem('le_sales')||'[]');
const putSales=d=>localStorage.setItem('le_sales',JSON.stringify(d));
const getEvts=()=>JSON.parse(localStorage.getItem('le_cevents')||'[]');
const putEvts=d=>localStorage.setItem('le_cevents',JSON.stringify(d));

function fmtDate(d){if(!d)return'-';return new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'2-digit'});}
function fmtShort(d){if(!d)return'-';return new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});}
function esc(s){return(s||'').replace(/'/g,"\\'");}

function JxBadge({diff}){
  if(diff<0){const a=Math.abs(diff);return <span className="jx jx-past">{a===1?'Hier':a<365?a+'j':Math.floor(a/365)+'an'}</span>;}
  if(diff===0)return <span className="jx jx-today">Auj.!</span>;
  if(diff<=7)return <span className="jx jx-soon">J-{diff}</span>;
  return <span className="jx jx-future">J-{diff}</span>;
}

function Toast({msg}){
  return msg?<div style={{position:'fixed',bottom:90,left:'50%',transform:'translateX(-50%)',background:'#1a1a1a',color:'#F9E29C',borderRadius:12,padding:'8px 20px',fontSize:12,fontWeight:600,zIndex:999,whiteSpace:'nowrap'}}>{msg}</div>:null;
}

// ── LOGIN
function Login({onLogin}){
  const [form,setForm]=useState('');
  const [name,setName]=useState('');
  const [email,setEmail]=useState('');
  const [pass,setPass]=useState('');
  const [err,setErr]=useState('');
  return(
    <div style={{minHeight:'100vh',background:'linear-gradient(160deg,#fffbf0,#fdfdfd)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24}}>
      <div className="gold-gradient" style={{width:64,height:64,borderRadius:20,display:'flex',alignItems:'center',justifyContent:'center',marginBottom:16,boxShadow:'0 8px 24px rgba(212,175,55,0.35)'}}>
        <i className="fas fa-crown" style={{fontSize:26,color:'white'}}></i>
      </div>
      <h1 style={{fontFamily:'Cormorant Garamond',fontSize:26,fontWeight:700,color:'#B8860B',letterSpacing:1}}>LIMITLESS ELITE</h1>

        {!form&&<>
          <p style={{fontSize:10,color:'#9ca3af',marginBottom:12,fontWeight:600}}>Choisissez votre espace</p>

          <button className="btn-gold" onClick={()=>name.trim()&&onLogin('consultant',name.trim())}>Accéder →</button>
          <button className="btn-ghost" onClick={()=>setForm('')}>Retour</button>
        </>}

        {form==='admin'&&<>
          <p style={{fontSize:10,color:'#9ca3af',fontWeight:600,marginBottom:10,textTransform:'uppercase',letterSpacing:1}}>Authentification</p>
          <input className="input-prestige" placeholder="Email" type="email" value={email} onChange={e=>setEmail(e.target.value)} style={{marginBottom:8}}/>
          <input className="input-prestige" placeholder="••••••••" type="password" value={pass} onChange={e=>setPass(e.target.value)} style={{marginBottom:8}} onKeyDown={e=>{if(e.key==='Enter'){if(email===ADMIN_EMAIL&&pass===ADMIN_PASS)onLogin('admin','Manager');else setErr('Identifiants incorrects');}}}/>

// ── AGENDA
function Agenda({user,sales,onClientClick}){
  const [filter,setFilter]=useState('all');
  const now=useMemo(()=>{const d=new Date();d.setHours(0,0,0,0);return d;},[]);
  const filters=[{k:'all',l:'Tout'},{k:'mus',l:'Islam'},{k:'cath',l:'Catho'},{k:'comm',l:'Business'},{k:'saison',l:'Saison'},{k:'prepa',l:'🛒 Push'},{k:'perso',l:'Perso'}];

  const evts=useMemo(()=>{
    let all=[...MASTER];
    getEvts().forEach(e=>all.push({n:e.n,d:e.d,t:'perso',lbl:e.lbl}));
    [...all].forEach(e=>{
      const pd=new Date(e.d);pd.setDate(pd.getDate()-20);
      all.push({n:e.n,d:pd.toISOString().split('T')[0],t:'prepa',lbl:'🛒 Push',isPrep:true});
    });
    if(filter!=='all')all=all.filter(e=>e.t===filter);
    const futurs=all.filter(e=>Math.ceil((new Date(e.d)-now)/86400000)>=0).sort((a,b)=>new Date(a.d)-new Date(b.d));
    const passes=all.filter(e=>Math.ceil((new Date(e.d)-now)/86400000)<0).sort((a,b)=>new Date(b.d)-new Date(a.d));
    return{futurs,passes};
  },[filter,now]);

  // Relances clients urgentes
  const mySales=user.role==='admin'?sales:sales.filter(s=>s.consultant===user.name);
  const urgents=useMemo(()=>{
    const m={};
    mySales.forEach(s=>{if(!m[s.client]||s.date>m[s.client])m[s.client]=s.date;});
    return Object.entries(m).filter(([,d])=>Math.floor((now-new Date(d))/86400000)>=60).map(([n,d])=>({name:n,days:Math.floor((now-new Date(d))/86400000)}));
  },[mySales,now]);

  function Row({ev}){
    const diff=Math.ceil((new Date(ev.d)-now)/86400000);
    const isPast=diff<0,color=TYPE_COLOR[ev.t]||'#B8860B';
    return(
      <div className={`card-luxe ${isPast?'past-row':''}`} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px',borderLeft:`3px solid ${isPast?'#e5e7eb':color}`}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:11,fontWeight:600,color:'#1a1a1a',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{ev.n}</div>
          <div style={{display:'flex',alignItems:'center',gap:6,marginTop:3}}>
            <span style={{fontSize:8,color:'#9ca3af'}}>{fmtShort(ev.d)}</span>
            <span className={`pill ${PILL_CLS[ev.t]}`}>{ev.lbl}</span>
          </div>
        </div>
        <JxBadge diff={diff}/>
      </div>
    );
  }

  return(
    <div>
      {urgents.length>0&&urgents.map((c,i)=>(
        <div key={i} onClick={()=>onClientClick(c.name)} style={{background:'#fff5f5',border:'1px solid #fecaca',borderRadius:14,padding:'10px 14px',display:'flex',alignItems:'center',gap:10,marginBottom:8,cursor:'pointer'}}>
          <i className="fas fa-triangle-exclamation" style={{color:'#e44258',fontSize:13}}></i>
          <div style={{flex:1}}><div style={{fontSize:10,fontWeight:700}}>{c.name}</div><div style={{fontSize:8,color:'#9ca3af'}}>Relance urgente — {c.days} jours</div></div>
          <i className="fas fa-chevron-right" style={{color:'#d1d5db',fontSize:10}}></i>
        </div>
      ))}

      <div className="chip-bar">
        {filters.map(f=><div key={f.k} className={`chip ${filter===f.k?'chip-on':''}`} onClick={()=>setFilter(f.k)}>{f.l}</div>)}
      </div>

      {evts.futurs.length?<>
        <div className="group-label">✦ Prochains — {evts.futurs.length}</div>
        {evts.futurs.map((ev,i)=><Row key={i} ev={ev}/>)}
      </>:<div style={{textAlign:'center',color:'#9ca3af',padding:30,fontSize:12}}>Aucun événement à venir</div>}

      {evts.passes.length?<>
        <div className="group-label" style={{marginTop:12}}>📁 Historique — {evts.passes.length}</div>
        {evts.passes.map((ev,i)=><Row key={i} ev={ev}/>)}
      </>:null}
    </div>
  );
}

// ── ÉVÉNEMENTS
function Evenements({onToast}){
  const [evts,setEvts]=useState(getEvts);
  const [name,setName]=useState('');
  const [type_,setType]=useState('Salon/Expo');
  const [date,setDate]=useState(new Date().toISOString().split('T')[0]);
  const now=useMemo(()=>{const d=new Date();d.setHours(0,0,0,0);return d;},[]);
  const types=['Salon/Expo','Réunion domicile','Réseaux sociaux','Réunion équipe','Brocante','Événement Privé','Autre'];

  function add(){
    if(!name.trim()||!date){onToast('⚠️ Titre et date requis');return;}
    const e=[...evts,{id:Date.now().toString(),n:name.trim(),lbl:type_,d:date}];
    setEvts(e);putEvts(e);setName('');onToast('✦ Événement ajouté !');
  }
  function del(id){const e=evts.filter(x=>x.id!==id);setEvts(e);putEvts(e);onToast('Supprimé');}

  return(
    <div>
      <div className="card-luxe">
        <p style={{fontSize:10,fontWeight:700,color:'#B8860B',textTransform:'uppercase',letterSpacing:1,marginBottom:12}}>Ajouter un événement</p>
        <input className="input-prestige" placeholder="Titre" value={name} onChange={e=>setName(e.target.value)} style={{marginBottom:8}}/>
        <select className="input-prestige" value={type_} onChange={e=>setType(e.target.value)} style={{marginBottom:8}}>
          {types.map(t=><option key={t}>{t}</option>)}
        </select>
        <input className="input-prestige" type="date" value={date} onChange={e=>setDate(e.target.value)} style={{marginBottom:8}}/>
        <button className="btn-gold" onClick={add}>Enregistrer</button>
      </div>

      {evts.length>0&&<>
        <div className="group-label">Mes événements ({evts.length})</div>
        {evts.sort((a,b)=>new Date(a.d)-new Date(b.d)).map(ev=>{
          const diff=Math.ceil((new Date(ev.d)-now)/86400000);
          return(
            <div key={ev.id} className="card-luxe" style={{display:'flex',alignItems:'center',gap:10,padding:'11px 14px',borderLeft:'3px solid #0891b2'}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:11,fontWeight:600}}>{ev.n}</div>
                <div style={{fontSize:8,color:'#9ca3af',marginTop:2}}>{fmtShort(ev.d)} · <span style={{color:'#0891b2'}}>{ev.lbl}</span></div>
              </div>
              <JxBadge diff={diff}/>
              <button onClick={()=>del(ev.id)} style={{background:'none',border:'none',color:'#d1d5db',cursor:'pointer',padding:4,fontSize:11}}>
                <i className="fas fa-trash-can"></i>
              </button>
            </div>
          );
        })}
      </>}

      <div className="group-label" style={{marginTop:12}}>Calendrier stratégique 2026</div>
      {['Islam','Catho','Business','Saison'].map(cat=>{
        const tMap={Islam:'mus',Catho:'cath',Business:'comm',Saison:'saison'};
        const items=MASTER.filter(e=>e.t===tMap[cat]).sort((a,b)=>new Date(a.d)-new Date(b.d));
        return(
          <div key={cat} style={{marginBottom:8}}>
            <div style={{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:1,color:TYPE_COLOR[tMap[cat]],padding:'6px 2px 3px'}}>{cat}</div>
            {items.map((e,i)=>{
              const diff=Math.ceil((new Date(e.d)-now)/86400000);
              const isPast=diff<0;
              return(
                <div key={i} className={`card-luxe ${isPast?'past-row':''}`} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',borderLeft:`3px solid ${TYPE_COLOR[tMap[cat]]}`}}>
                  <div style={{flex:1,fontSize:10,fontWeight:500}}>{e.n}</div>
                  <span style={{fontSize:8,color:'#9ca3af'}}>{fmtShort(e.d)}</span>
                  <JxBadge diff={diff}/>
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

// ── VENTE
function Vente({user,sales,setSales,onToast}){
  const [consultant,setConsultant]=useState('');
  const [client,setClient]=useState('');
  const [prod,setProd]=useState('');
  const [qty,setQty]=useState('1');
  const [cat,setCat]=useState('Parfum');
  const [amt,setAmt]=useState('');
  const [cur,setCur]=useState('DA');
  const [date,setDate]=useState(new Date().toISOString().split('T')[0]);
  const [note,setNote]=useState('');
  const cats=['Parfum','Soin visage','Soin corps','Maquillage','Coffret','Autre'];
  const mySales=user.role==='admin'?sales:sales.filter(s=>s.consultant===user.name);
  const allClients=[...new Set(mySales.map(s=>s.client))];
  const allCons=[...new Set(sales.map(s=>s.consultant))];

  function save(){
    if(!client.trim()||!prod.trim()||!date){onToast('⚠️ Client, produit et date requis');return;}

// ── CLIENTS
function Clients({user,sales,onClientClick}){
  const [filter,setFilter]=useState('all');
  const [search,setSearch]=useState('');
  const now=useMemo(()=>{const d=new Date();d.setHours(0,0,0,0);return d;},[]);
  const mySales=user.role==='admin'?sales:sales.filter(s=>s.consultant===user.name);

  const clientsMap=useMemo(()=>{
    const m={};
    mySales.forEach(s=>{
      if(!m[s.client])m[s.client]={name:s.client,purchases:[],total:0,lastDate:'',topProd:{}};
      m[s.client].purchases.push(s);m[s.client].total+=s.amount;
      if(!m[s.client].lastDate||s.date>m[s.client].lastDate)m[s.client].lastDate=s.date;
      m[s.client].topProd[s.product]=(m[s.client].topProd[s.product]||0)+1;
    });
    return m;
  },[mySales]);

  const maxTotal=Math.max(...Object.values(clientsMap).map(c=>c.total),1);
  let clients=Object.values(clientsMap);
  if(search)clients=clients.filter(c=>c.name.toLowerCase().includes(search.toLowerCase()));
  clients=clients.filter(c=>{
    const d=Math.floor((now-new Date(c.lastDate))/86400000);
    if(filter==='recent')return d<30;if(filter==='warn')return d>=30&&d<60;if(filter==='urgent')return d>=60;return true;
  }).sort((a,b)=>new Date(b.lastDate)-new Date(a.lastDate));

  const grR=clients.filter(c=>Math.floor((now-new Date(c.lastDate))/86400000)<30);
  const grW=clients.filter(c=>{const d=Math.floor((now-new Date(c.lastDate))/86400000);return d>=30&&d<60;});
  const grU=clients.filter(c=>Math.floor((now-new Date(c.lastDate))/86400000)>=60);

  function Row({c,i}){
    const d=Math.floor((now-new Date(c.lastDate))/86400000);
    const pct=Math.round((c.total/maxTotal)*100);
    const color=AVT_COLORS[i%AVT_COLORS.length];
    const init=c.name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
    const top=Object.entries(c.topProd).sort((a,b)=>b[1]-a[1])[0];
    const sColor=d<30?'#16a34a':d<60?'#d97706':'#e44258';
    const sLabel=d<30?'Récent':d<60?'À relancer':'Urgent !';
    return(
      <div className="client-row" onClick={()=>onClientClick(c.name)}>
        <div className="avatar" style={{background:color}}>{init}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:11,fontWeight:600}}>{c.name}</div>
          <div style={{fontSize:8,color:'#9ca3af'}}>{top?top[0]:''} · {c.purchases.length} achat(s)</div>
          <div className="bar-track"><div className="bar-fill" style={{width:pct+'%'}}></div></div>
        </div>
        <div style={{textAlign:'right',flexShrink:0}}>
          <div style={{fontSize:10,fontWeight:700,color:'#B8860B'}}>{c.total.toFixed(0)} {c.purchases[0]?.currency||'DA'}</div>
          <div style={{fontSize:8,color:sColor,fontWeight:600}}>{sLabel}</div>
        </div>
        <i className="fas fa-chevron-right" style={{color:'#d1d5db',fontSize:9,marginLeft:6}}></i>
      </div>
    );
  }

  function Grp({title,color,items,offset=0}){
    if(!items.length)return null;
    return(<>
      <div style={{display:'flex',alignItems:'center',gap:6,padding:'6px 2px 3px'}}>
        <div style={{width:10,height:10,borderRadius:3,background:color,flexShrink:0}}></div>
        <span style={{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:0.8,color}}>{title}</span>
        <span style={{marginLeft:'auto',background:'#f3f4f6',borderRadius:20,padding:'1px 8px',fontSize:8,color:'#9ca3af'}}>{items.length}</span>
      </div>
      {items.map((c,i)=><Row key={c.name} c={c} i={i+offset}/>)}
    </>);
  }

  return(
    <div>
      <input className="input-prestige" placeholder="🔍  Rechercher un client..." value={search} onChange={e=>setSearch(e.target.value)} style={{marginBottom:10}}/>
      <div className="chip-bar">
        {[{k:'all',l:'Tous'},{k:'recent',l:'Récents'},{k:'warn',l:'À relancer'},{k:'urgent',l:'Urgents'}].map(f=>(
          <div key={f.k} className={`chip ${filter===f.k?'chip-on':''}`} onClick={()=>setFilter(f.k)}>{f.l}</div>
        ))}
      </div>
      {filter==='all'?<>
        <Grp title="Clients récents" color="#16a34a" items={grR} offset={0}/>
        <Grp title="À relancer" color="#d97706" items={grW} offset={grR.length}/>
        <Grp title="Relance urgente" color="#e44258" items={grU} offset={grR.length+grW.length}/>
      </>:<>{clients.map((c,i)=><Row key={c.name} c={c} i={i}/>)}</>}
      {!clients.length&&<div style={{textAlign:'center',color:'#9ca3af',padding:30,fontSize:12}}>Aucun client trouvé</div>}
    </div>
  );
}

// ── STATS
function Stats({user,sales}){
  const mySales=user.role==='admin'?sales:sales.filter(s=>s.consultant===user.name);
  const now=new Date();
  function block(cur){
    const s=mySales.filter(x=>x.currency===cur);
    const thisM=s.filter(x=>{const d=new Date(x.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});
    const lastM=s.filter(x=>{const d=new Date(x.date),lm=new Date(now.getFullYear(),now.getMonth()-1,1);return d.getMonth()===lm.getMonth()&&d.getFullYear()===lm.getFullYear();});
    const total=s.reduce((t,x)=>t+x.amount,0);
    const thisCA=thisM.reduce((t,x)=>t+x.amount,0),lastCA=lastM.reduce((t,x)=>t+x.amount,0);
    const trend=lastCA>0?Math.round(((thisCA-lastCA)/lastCA)*100):null;
    const monthly={};
    for(let i=5;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);const key=d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0');monthly[key]={label:d.toLocaleDateString('fr-FR',{month:'short'}),val:0};}
    s.forEach(x=>{const k=x.date.substring(0,7);if(monthly[k])monthly[k].val+=x.amount;});
    const mVals=Object.values(monthly),maxM=Math.max(...mVals.map(m=>m.val),1);
    const byCat={};s.forEach(x=>{byCat[x.category]=(byCat[x.category]||0)+x.amount;});
    const maxCat=Math.max(...Object.values(byCat),1);
    const isEU=cur==='€';

    return(
      <div key={cur} style={{marginBottom:20}}>

          <div style={{flex:1,height:1,background:'#f3f4f6'}}></div>
        </div>
        <div className="stat-card">
          <p style={{fontSize:9,textTransform:'uppercase',letterSpacing:2,opacity:0.6,marginBottom:6}}>CA Total {cur}</p>
          <p style={{fontSize:32,fontWeight:700,color:'#F9E29C'}}>{total.toLocaleString()} {cur}</p>
          <p style={{fontSize:10,opacity:0.6,marginTop:4}}>Ce mois : {thisCA.toFixed(cur==='€'?2:0)} {cur}{trend!==null?` · ${trend>=0?'↑':'↓'} ${Math.abs(trend)}% vs M-1`:''}</p>
        </div>
        <div className="card-luxe" style={{padding:'14px'}}>
          <p style={{fontSize:9,fontWeight:700,color:'#9ca3af',textTransform:'uppercase',marginBottom:10}}>CA 6 mois</p>
          <div style={{display:'flex',alignItems:'flex-end',gap:5,height:70}}>
            {mVals.map((m,i)=><div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
              <span style={{fontSize:7,color:accentColor,fontWeight:700}}>{m.val>0?m.val.toFixed(0):''}</span>
              <div style={{width:'100%',borderRadius:'3px 3px 0 0',minHeight:3,background:`linear-gradient(180deg,${accentColor},${accentColor}88)`,height:Math.max(Math.round((m.val/maxM)*54),3)+'px'}}></div>
              <span style={{fontSize:7,color:'#9ca3af'}}>{m.label}</span>
            </div>)}
          </div>
        </div>
        {Object.keys(byCat).length>0&&<div className="card-luxe" style={{padding:'14px'}}>
          <p style={{fontSize:9,fontWeight:700,color:'#9ca3af',textTransform:'uppercase',marginBottom:10}}>Par catégorie</p>
          {Object.entries(byCat).sort((a,b)=>b[1]-a[1]).map(([cat,val])=>(
            <div key={cat} style={{marginBottom:8}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:9,marginBottom:3}}><span style={{fontWeight:500}}>{cat}</span><span style={{color:accentColor,fontWeight:700}}>{val.toFixed(cur==='€'?2:0)} {cur}</span></div>
              <div className="bar-track"><div style={{height:'100%',borderRadius:4,width:Math.round((val/maxCat)*100)+'%',background:`linear-gradient(90deg,${accentColor},${accentColor}88)`}}></div></div>
            </div>
          ))}
        </div>}
      </div>
    );
  }

  const clientsMap={};
  mySales.forEach(s=>{if(!clientsMap[s.client])clientsMap[s.client]={name:s.client,total:0,cur:s.currency};clientsMap[s.client].total+=s.amount;});
  const topClients=Object.values(clientsMap).sort((a,b)=>b.total-a.total).slice(0,5);

  return(

        {[{v:mySales.length,l:'Total ventes'},{v:new Set(mySales.map(s=>s.client)).size,l:'Clients'}].map((kpi,i)=>(

            <div style={{fontSize:10,fontWeight:700,color:'#B8860B'}}>{c.total.toFixed(0)} {c.cur}</div>
          </div>
        ))}
      </div>}
    </div>
  );
}

  const totalCA=sales.reduce((t,s)=>t+s.amount,0);
  const allClients=new Set(sales.map(s=>s.client)).size;
  const consultants=new Set(sales.map(s=>s.consultant));
  const byC={};sales.forEach(s=>{if(!byC[s.consultant])byC[s.consultant]={name:s.consultant,sales:0,ca:0};byC[s.consultant].sales++;byC[s.consultant].ca+=s.amount;});
  const topC=Object.values(byC).sort((a,b)=>b.ca-a.ca),maxCA=Math.max(...topC.map(c=>c.ca),1);

// ── ÉQUIPE

  sales.forEach(s=>{if(!byC[s.consultant])byC[s.consultant]={name:s.consultant,sales:[],clients:new Set()};byC[s.consultant].sales.push(s);byC[s.consultant].clients.add(s.client);});
  const sorted=Object.values(byC).sort((a,b)=>b.sales.reduce((t,s)=>t+s.amount,0)-a.sales.reduce((t,s)=>t+s.amount,0));
  return(
    <div>
      {sorted.map((c,i)=>{
        const ca=c.sales.reduce((t,s)=>t+s.amount,0);
        const thisM=c.sales.filter(s=>{const d=new Date(s.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});
        const last=c.sales.sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
        const color=AVT_COLORS[i%AVT_COLORS.length];

        return(

              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:700}}>{c.name}</div>
                <div style={{fontSize:9,color:'#9ca3af'}}>{c.clients.size} client(s) · {c.sales.length} vente(s)</div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontSize:12,fontWeight:700,color:'#B8860B'}}>{ca.toFixed(0)} DA</div>

              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr'}}>
              {[{v:thisM.length,l:'Ce mois'},{v:thisM.reduce((t,s)=>t+s.amount,0).toFixed(0)+' DA',l:'CA mois'},{v:last?fmtShort(last.date):'-',l:'Dernière vente'}].map((k,j)=>(
                <div key={j} style={{padding:'10px 8px',textAlign:'center',borderRight:j<2?'1px solid #f9f9f9':'none'}}>
                  <div style={{fontSize:13,fontWeight:700,color:'#1a1a1a'}}>{k.v}</div>
                  <div style={{fontSize:7,color:'#9ca3af',marginTop:1}}>{k.l}</div>
                </div>
              ))}
            </div>
            <div style={{padding:'10px 14px',borderTop:'1px solid #f9f9f9'}}>
              {c.sales.sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,3).map((s,j)=>(
                <div key={j} style={{display:'flex',justifyContent:'space-between',fontSize:9,color:'#9ca3af',marginBottom:3}}>
                  <span>{s.client} — {s.product}</span>
                  <span style={{color:'#B8860B',fontWeight:600}}>{s.amount} {s.currency}</span>
                </div>
              ))}
            </div>
          </div>
        );
      })}
      {!sorted.length&&<div style={{textAlign:'center',color:'#9ca3af',padding:40,fontSize:12}}>Aucune consultante.<br/>Elles apparaissent dès leur première vente.</div>}
    </div>
  );
}

// ── CLIENT MODAL
function ClientModal({name,sales,onClose}){
  const now=new Date();now.setHours(0,0,0,0);
  const s=sales.filter(x=>x.client===name).sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(!s.length)return null;
  const days=Math.floor((now-new Date(s[0].date))/86400000);
  const total=s.reduce((t,x)=>t+x.amount,0);
  const prods={};s.forEach(x=>{prods[x.product]=(prods[x.product]||0)+x.qty;});
  const sColor=days<30?'#16a34a':days<60?'#d97706':'#e44258';
  const sTxt=days<30?'Client récent ✓':days<60?'⚠️ À relancer':'🚨 Relance urgente !';
  return(
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal-sheet">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <h3 style={{fontSize:16,fontWeight:700,color:'#B8860B',fontFamily:'Cormorant Garamond'}}>{name}</h3>
          <button onClick={onClose} style={{background:'#f3f4f6',border:'none',borderRadius:8,padding:'5px 10px',cursor:'pointer',fontSize:12}}>✕</button>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6,marginBottom:12}}>
          {[{v:s.length,l:'Achats'},{v:total.toFixed(0),l:s[0]?.currency||'DA'},{v:days,l:'Jours'}].map((k,i)=>(
            <div key={i} className="card-luxe" style={{textAlign:'center',padding:'10px 6px',marginBottom:0}}>
              <div style={{fontSize:18,fontWeight:800,color:'#B8860B',fontFamily:'Cormorant Garamond'}}>{k.v}</div>
              <div style={{fontSize:8,color:'#9ca3af',textTransform:'uppercase'}}>{k.l}</div>
            </div>
          ))}
        </div>
        <div style={{background:'#fafafa',borderRadius:12,padding:10,marginBottom:12}}>
          <div style={{fontSize:10,fontWeight:700,color:sColor}}>{sTxt}</div>
          <div style={{fontSize:9,color:'#9ca3af',marginTop:2}}>Dernier achat : {fmtDate(s[0].date)}</div>
        </div>
        <p style={{fontSize:9,fontWeight:700,color:'#B8860B',textTransform:'uppercase',letterSpacing:0.5,marginBottom:6}}>Produits préférés</p>
        <div style={{marginBottom:12}}>{Object.entries(prods).sort((a,b)=>b[1]-a[1]).map(([p,q])=><span key={p} style={{background:'#fef3c7',border:'1px solid #fde68a',borderRadius:6,padding:'2px 8px',fontSize:8,color:'#B8860B',display:'inline-block',margin:2}}>{p} ×{q}</span>)}</div>
        <p style={{fontSize:9,fontWeight:700,color:'#B8860B',textTransform:'uppercase',letterSpacing:0.5,marginBottom:8}}>Historique</p>
        {s.map((x,i)=>(
          <div key={i} style={{background:'#fafafa',borderRadius:12,padding:'10px 12px',marginBottom:7}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
              <div>
                <div style={{fontSize:11,fontWeight:600}}>{x.product}</div>
                <div style={{fontSize:8.5,color:'#9ca3af'}}>{x.category} · Qté {x.qty}</div>
                {x.note&&<div style={{fontSize:8.5,color:'#9ca3af',marginTop:3,fontStyle:'italic'}}>"{x.note}"</div>}
              </div>
              <div style={{textAlign:'right',flexShrink:0}}>
                <div style={{fontSize:11,fontWeight:700,color:'#B8860B'}}>{x.amount} {x.currency}</div>
                <div style={{fontSize:8,color:'#9ca3af'}}>{fmtDate(x.date)}</div>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── APP
function App(){
  const [user,setUser]=useState(null);
  const [tab,setTab]=useState('agenda');
  const [sales,setSales]=useState(getSales);
  const [toast,setToast]=useState('');
  const [clientModal,setClientModal]=useState(null);

  function showToast(msg){setToast(msg);setTimeout(()=>setToast(''),2600);}

  const isAdmin=user?.role==='admin';
  const tabs=[
    {id:'agenda',icon:'fa-calendar-check',lbl:'Agenda'},
    {id:'evenements',icon:'fa-list-check',lbl:'Événements'},
    {id:'vente',icon:'fa-bag-shopping',lbl:'Vente'},
    {id:'clients',icon:'fa-users',lbl:'Clients'},
    {id:'stats',icon:'fa-chart-line',lbl:'Stats'},
    ...(isAdmin?[{id:'dashboard',icon:'fa-gauge-high',lbl:'Dashboard'},{id:'equipe',icon:'fa-people-group',lbl:'Équipe'}]:[]),
  ];

  if(!user)return <Login onLogin={(role,name)=>{setUser({role,name});setTab('agenda');}}/>;

  return(
    <div style={{maxWidth:480,margin:'0 auto',minHeight:'100vh'}}>
      {/* HEADER */}
      <div className="gold-gradient" style={{borderRadius:'0 0 2.5rem 2.5rem',padding:'20px 20px 28px',display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16,boxShadow:'0 8px 32px rgba(212,175,55,0.2)'}}>
        <div>
          <h1 style={{fontFamily:'Cormorant Garamond',fontSize:20,fontWeight:700,color:'white',letterSpacing:0.5,margin:0}}>Limitless Elite</h1>
          <p style={{fontSize:8,color:'rgba(255,255,255,0.75)',letterSpacing:2,textTransform:'uppercase',margin:'2px 0 0'}}>{user.name} · {isAdmin?'Administrateur':'Consultante'}</p>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          {isAdmin&&<span style={{background:'rgba(255,255,255,0.25)',color:'white',fontSize:7,fontWeight:800,padding:'3px 8px',borderRadius:20,letterSpacing:0.5}}>ADMIN</span>}
          <button onClick={()=>setUser(null)} style={{background:'rgba(255,255,255,0.2)',border:'none',borderRadius:10,padding:'7px 10px',color:'white',cursor:'pointer',fontSize:12}}><i className="fas fa-right-from-bracket"></i></button>
        </div>
      </div>

      {/* PAGE TITLE */}
      <div style={{padding:'0 20px 10px'}}>
        <p style={{fontSize:8,color:'#9ca3af',textAlign:'right'}}>{new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})}</p>
      </div>

      {/* CONTENT */}
      <div style={{padding:'0 16px'}}>
        {tab==='agenda'&&<Agenda user={user} sales={sales} onClientClick={n=>setClientModal(n)}/>}
        {tab==='evenements'&&<Evenements onToast={showToast}/>}
        {tab==='vente'&&<Vente user={user} sales={sales} setSales={setSales} onToast={showToast}/>}
        {tab==='clients'&&<Clients user={user} sales={sales} onClientClick={n=>setClientModal(n)}/>}
        {tab==='stats'&&<Stats user={user} sales={sales}/>}
        {tab==='dashboard'&&isAdmin&&<Dashboard sales={sales}/>}
        {tab==='equipe'&&isAdmin&&<Equipe sales={sales}/>}
      </div>

      {/* BOTTOM NAV */}
      <nav style={{position:'fixed',bottom:0,left:0,right:0,maxWidth:480,margin:'0 auto',background:'rgba(255,255,255,0.97)',backdropFilter:'blur(12px)',display:'flex',justifyContent:'space-around',alignItems:'center',padding:'10px 4px 14px',borderTop:'1px solid #f3f4f6',boxShadow:'0 -4px 20px rgba(0,0,0,0.05)',zIndex:100,borderRadius:'2rem 2rem 0 0'}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2,background:'none',border:'none',cursor:'pointer',color:tab===t.id?'#B8860B':'#d1d5db',transition:'all 0.15s',fontFamily:'Poppins',flex:1,padding:'2px 0'}}>
            <i className={`fas ${t.icon}`} style={{fontSize:16}}></i>
            <span style={{fontSize:7.5,fontWeight:600,textTransform:'uppercase',letterSpacing:0.3}}>{t.lbl}</span>
          </button>
        ))}
      </nav>

      {/* MODALS & TOAST */}
      {clientModal&&<ClientModal name={clientModal} sales={sales} onClose={()=>setClientModal(null)}/>}
      <Toast msg={toast}/>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
